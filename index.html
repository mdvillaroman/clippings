        <p style="font-size:.82rem;color:var(--ink-2);max-width:48ch;line-height:1.5;">Track Google News for brand mentions automatically. New articles surface below for one-click approval.</p>
      </div>
      <button onclick="openMonitorModal('${b.id}')" class="btn btn-ghost btn-sm" style="flex-shrink:0;">+ Add keyword</button>
    </div>

    ${monitors.length === 0 ? `
      <div style="border:1px dashed var(--rule);border-radius:var(--radius-lg);padding:56px 32px;text-align:center;">
        <div style="width:48px;height:48px;border-radius:50%;background:var(--paper-2);margin:0 auto 18px;display:grid;place-items:center;">
          <svg width="20" height="20" fill="none" stroke="${accent}" stroke-width="1.4" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <h3 style="font-family:var(--font-display);font-size:1.3rem;font-weight:400;margin-bottom:8px;">No monitors yet</h3>
        <p style="font-size:.82rem;color:var(--ink-2);max-width:340px;margin:0 auto 22px;line-height:1.55;">Add a keyword like the client's brand name to scan Google News for new coverage.</p>
        <button onclick="openMonitorModal('${b.id}')" class="btn btn-primary btn-sm">Add your first keyword</button>
      </div>
    ` : `
      <div style="border:1px solid var(--rule);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);">
        ${monitors.map((m, i) => `
          <div style="padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;${i < monitors.length - 1 ? 'border-bottom:1px solid var(--rule);' : ''}transition:background var(--t-fast) var(--ease);"
            onmouseover="this.style.background='var(--paper-2)'" onmouseout="this.style.background=''">
            <div style="display:flex;align-items:center;gap:14px;min-width:0;flex:1;">
              <div style="width:34px;height:34px;border-radius:8px;background:${accent}14;display:grid;place-items:center;flex-shrink:0;">
                <svg width="14" height="14" fill="none" stroke="${accent}" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </div>
              <div style="min-width:0;">
                <div style="font-size:.88rem;font-weight:600;color:var(--ink);letter-spacing:-0.005em;" class="truncate">"${esc(m.keyword)}"</div>
                <div style="font-size:.7rem;color:var(--ink-3);margin-top:3px;">${m.lastChecked ? `Last checked ${fmtDateShort(m.lastChecked.slice(0,10))}` : 'Never checked'}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
              <button onclick="checkRSS('${b.id}', ${i})" class="btn btn-ghost btn-sm">
                <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Check
              </button>
              <button onclick="removeMonitor('${b.id}', ${i})" style="color:var(--ink-3);padding:7px;border-radius:var(--radius);transition:background var(--t-fast) var(--ease),color var(--t) var(--ease);"
                onmouseover="this.style.background='var(--paper-2)';this.style.color='var(--red)'" onmouseout="this.style.background='';this.style.color='var(--ink-3)'" title="Remove">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
          </div>
        `).join('')}
        <div style="padding:14px 22px;background:var(--paper-2);border-top:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;gap:12px;">
          <span style="font-size:.7rem;color:var(--ink-3);font-weight:500;letter-spacing:0.04em;display:inline-flex;align-items:center;gap:7px;">
            <span style="width:6px;height:6px;border-radius:50%;background:#3aa76d;box-shadow:0 0 0 3px rgba(58,167,109,0.18);"></span>
            ${backendBase() ? '24/7 monitoring active via your backend' : 'Auto-checks every 30 min while open'}
          </span>
          <button onclick="checkAllRSS('${b.id}')" class="btn btn-primary btn-sm">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Check now
          </button>
        </div>
      </div>
      <div style="margin-top:14px;font-size:.72rem;color:var(--ink-3);line-height:1.5;display:flex;gap:8px;align-items:flex-start;">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span>${backendBase() ? 'Your backend checks the news around the clock — even with this app closed. New mentions are waiting here whenever you open it.' : 'Monitoring runs automatically while Clippings is open in a tab. Connect a backend in Settings for 24/7 checks with the app closed.'}</span>
      </div>
    `}
  </div>

  ${pending.length > 0 ? `
  <div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--rule);">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <span class="eyebrow">Section 02</span>
          <span style="background:${accent};color:#fff;font-family:var(--font-mono);font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:0.04em;">${pending.length} NEW</span>
        </div>
        <h2 style="font-family:var(--font-display);font-size:1.7rem;font-weight:400;letter-spacing:-.018em;color:var(--ink);margin-bottom:6px;">Pending Mentions</h2>
        <p style="font-size:.82rem;color:var(--ink-2);">Review and approve to add to the book.</p>
      </div>
      <button onclick="dismissAllPending('${b.id}')" class="btn btn-ghost btn-sm" style="color:var(--red);border-color:var(--rule);flex-shrink:0;">Dismiss all</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${pending.map((p, i) => `
        <div style="border:1px solid var(--rule);border-radius:var(--radius-lg);padding:18px 22px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;gap:18px;transition:border-color var(--t) var(--ease);"
          onmouseover="this.style.borderColor='#d4d0ca'" onmouseout="this.style.borderColor='var(--rule)'">
          <div style="min-width:0;flex:1;">
            <h3 style="font-family:var(--font-display);font-size:1.15rem;font-weight:400;line-height:1.22;color:var(--ink);margin-bottom:8px;letter-spacing:-.01em;" class="line-clamp-2">${esc(p.title)}</h3>
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-2);">${esc(p.outlet)}</span>
              <span style="width:3px;height:3px;border-radius:3px;background:var(--rule);"></span>
              <span style="font-size:.7rem;color:var(--ink-3);">${fmtDateShort(p.date)}</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
            <button onclick="approvePending('${b.id}',${i})" class="btn btn-primary btn-sm">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
              Add
            </button>
            <button onclick="dismissPending('${b.id}',${i})" style="color:var(--ink-3);padding:7px;border-radius:var(--radius);transition:background var(--t-fast) var(--ease),color var(--t) var(--ease);"
              onmouseover="this.style.background='var(--paper-2)';this.style.color='var(--red)'" onmouseout="this.style.background='';this.style.color='var(--ink-3)'" title="Dismiss">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
      `).join('')}
    </div>
  </div>` : (monitors.length > 0 ? `
    <div style="border:1px dashed var(--rule);border-radius:var(--radius-lg);padding:44px 32px;text-align:center;">
      <div style="width:44px;height:44px;border-radius:50%;background:var(--paper-2);margin:0 auto 14px;display:grid;place-items:center;">
        <svg width="18" height="18" fill="none" stroke="var(--ink-3)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <h3 style="font-size:.95rem;font-weight:600;margin-bottom:4px;color:var(--ink);">No new mentions</h3>
      <p style="font-size:.74rem;color:var(--ink-3);">Click "Check" on a keyword to scan for new coverage.</p>
    </div>
  ` : '')}`;
}

// PAGE: INVOICE — billable document tied to the book

function pageInvoice(b) {
  const accent = b.accentColor || '#2d5f3d';
  if (!b.invoice) b.invoice = defaultInvoice(b);
  const inv = b.invoice;
  const { subtotal, discountAmount, tax, total } = invoiceTotals(inv);
  const cur = inv.currency || 'PHP';
  return `
  <nav class="no-print" aria-label="Invoice" style="background:#1a1815;color:#fff;position:sticky;top:0;z-index:10;">
    <div class="wrap flex-between" style="padding:12px 32px;">
      <button onclick="go('book','${b.id}')" class="flex gap-2" style="font-size:.74rem;color:rgba(255,255,255,0.55);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.55)'">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        Back to book
      </button>
      <div class="flex gap-2">
        <button onclick="cycleInvoiceStatus('${b.id}')" class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.25);" title="Click to change status">${({draft:'● Draft',sent:'● Sent',paid:'✓ Paid'})[inv.status||'draft']}</button>
        <button onclick="openInvoiceModal('${b.id}')" class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.25);">Edit</button>
        <button onclick="emailInvoice('${b.id}')" class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.25);">Email client</button>
        <button onclick="window.print()" style="background:#fff;color:#1a1815;padding:8px 16px;border-radius:var(--radius);font-size:.74rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
          Save as PDF
        </button>
      </div>
    </div>
  </nav>

  <main class="report" style="max-width:780px;margin:32px auto;background:var(--paper);box-shadow:0 12px 60px rgba(26,24,21,0.06);padding:64px 64px 56px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:32px;margin-bottom:48px;">
      <div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
          ${b.clientLogo ? `<div style="width:40px;height:40px;border-radius:8px;overflow:hidden;background:#fff;border:1px solid var(--rule);display:grid;place-items:center;"><img src="${b.clientLogo}" alt="" style="width:100%;height:100%;object-fit:contain;padding:4px;" onerror="this.style.display='none'"></div>` : ''}
          <div style="font-family:var(--font);font-size:.82rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink);">${esc(settings.agency)}</div>
        </div>
        ${settings.agencyAddress ? `<div style="font-size:.76rem;color:var(--ink-3);line-height:1.5;">${esc(settings.agencyAddress)}</div>` : ''}
        ${settings.agencyEmail ? `<div style="font-size:.76rem;color:var(--ink-3);line-height:1.5;">${esc(settings.agencyEmail)}</div>` : ''}
        ${settings.agencyUrl ? `<div style="font-size:.76rem;color:var(--ink-3);line-height:1.5;">${esc(settings.agencyUrl)}</div>` : ''}
      </div>
      <div style="text-align:right;">
        <h1 style="font-family:var(--font-display);font-size:2.6rem;font-weight:400;letter-spacing:-.02em;color:${accent};line-height:1;">Invoice</h1>
        <div class="mono" style="font-size:.82rem;color:var(--ink-2);margin-top:10px;letter-spacing:0.04em;">${esc(inv.number)}</div>
        ${(() => {
          const st = inv.status || 'draft';
          const map = { draft: { t: 'DRAFT', c: '#8a8378', bg: 'rgba(138,131,120,0.12)' }, sent: { t: 'SENT', c: accent, bg: `${accent}1a` }, paid: { t: 'PAID', c: '#2d7a4a', bg: 'rgba(45,122,74,0.12)' } };
          const s = map[st] || map.draft;
          return `<div style="display:inline-block;margin-top:12px;font-family:var(--font-mono);font-size:.62rem;font-weight:700;letter-spacing:0.14em;color:${s.c};background:${s.bg};border:1px solid ${s.c}40;padding:4px 10px;border-radius:100px;">${s.t}</div>`;

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:40px;">

        ${inv.billToAddress ? `<div style="font-size:.78rem;color:var(--ink-2);margin-top:4px;line-height:1.5;">${esc(inv.billToAddress)}</div>` : ''}
        ${inv.billToEmail ? `<div style="font-size:.78rem;color:var(--ink-2);margin-top:2px;">${esc(inv.billToEmail)}</div>` : ''}
      </div>
      <div style="text-align:right;align-self:start;">
        <div style="display:flex;justify-content:flex-end;gap:14px;margin-bottom:6px;"><span style="font-size:.72rem;color:var(--ink-3);">Issued</span><span class="mono" style="font-size:.78rem;color:var(--ink);min-width:96px;text-align:right;">${esc(fmtDate(inv.issueDate))}</span></div>
        <div style="display:flex;justify-content:flex-end;gap:14px;"><span style="font-size:.72rem;color:var(--ink-3);">Due</span><span class="mono" style="font-size:.78rem;color:var(--ink);min-width:96px;text-align:right;">${esc(fmtDate(inv.dueDate))}</span></div>
      </div>
    </div>

    <table style="width:100%;border-collapse:collapse;margin-bottom:28px;">
      <thead>
        <tr style="border-bottom:2px solid var(--ink);">

          <th style="text-align:right;padding:10px 0;font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-3);width:120px;">Rate</th>
          <th style="text-align:right;padding:10px 0;font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-3);width:130px;">Amount</th>
        </tr>
      </thead>
      <tbody>
        ${(inv.items || []).map(it => `
          <tr style="border-bottom:1px solid var(--rule);">
            <td style="padding:14px 0;font-size:.86rem;color:var(--ink);vertical-align:top;">${esc(it.desc)}${it.note ? `<div style="font-size:.72rem;color:var(--ink-3);line-height:1.5;margin-top:5px;white-space:pre-line;">${esc(it.note)}</div>` : ''}</td>

            <td style="padding:14px 0;font-size:.86rem;color:var(--ink-2);text-align:right;vertical-align:top;" class="mono">${fmtMoney(it.rate, cur)}</td>
            <td style="padding:14px 0;font-size:.86rem;color:var(--ink);text-align:right;font-weight:600;vertical-align:top;" class="mono">${fmtMoney((+it.qty||0)*(+it.rate||0), cur)}</td>
          </tr>`).join('')}
      </tbody>
    </table>

    <div style="display:flex;justify-content:flex-end;margin-bottom:40px;">
      <div style="width:280px;">
        <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:.84rem;color:var(--ink-2);"><span>Subtotal</span><span class="mono">${fmtMoney(subtotal, cur)}</span></div>
        ${discountAmount ? `<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:.84rem;color:var(--ink-2);"><span>${esc(inv.discountLabel || 'Discount')}</span><span class="mono">-${fmtMoney(discountAmount, cur)}</span></div>` : ''}
        ${inv.taxPct ? `<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:.84rem;color:var(--ink-2);"><span>Tax (${esc(String(inv.taxPct))}%)</span><span class="mono">${fmtMoney(tax, cur)}</span></div>` : ''}
        <div style="display:flex;justify-content:space-between;padding:14px 0 0;margin-top:6px;border-top:2px solid var(--ink);font-size:1.05rem;font-weight:700;color:var(--ink);"><span>Total due</span><span class="mono" style="color:${accent};">${fmtMoney(total, cur)}</span></div>
      </div>
    </div>

    ${(inv.paymentDetails || settings.paymentDetails) ? `<div style="border-top:1px solid var(--rule);padding-top:20px;margin-bottom:24px;"><div style="font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-3);margin-bottom:8px;">How to pay</div><div style="font-size:.82rem;color:var(--ink-2);line-height:1.7;white-space:pre-line;">${esc(inv.paymentDetails || settings.paymentDetails)}</div></div>` : ''}

    ${inv.notes ? `<div style="border-top:1px solid var(--rule);padding-top:20px;"><div style="font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-3);margin-bottom:8px;">Notes</div><div style="font-size:.82rem;color:var(--ink-2);line-height:1.6;">${esc(inv.notes)}</div></div>` : ''}

    <div style="margin-top:40px;text-align:center;font-size:.7rem;color:var(--ink-3);letter-spacing:0.04em;">${esc(settings.agency)} · Invoice for ${esc(b.name)}</div>
  </main>`;
}

// ═══════════════════════════════════════════════════════════════════
// PAGE: REPORT — editorial monograph
// ═══════════════════════════════════════════════════════════════════
function pageReport(b) {
  const clips = b.clips || [];
  const s = bookStats(b);
  const today = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  const monthLabel = (() => {
    const dates = (clips || []).map(c => c.date).filter(Boolean).sort();
    const src = dates.length ? new Date(dates[Math.floor(dates.length/2)]) : new Date();
    return src.toLocaleDateString('en-US', { month:'long', year:'numeric' });
  })();
  const accent = b.accentColor || '#2d5f3d';
  const accentDeep = shadeHex(accent, -0.34);
  const sortedClips = [...clips].sort((a,b) => (+b.domainAuthority||0) - (+a.domainAuthority||0));
  const logoFor = c => c.outletLogo || (extractDomain(c.url||'') ? outletLogoUrl(extractDomain(c.url||'')) : '');
  const fmtV = n => (+n ? fmt(+n) : '—');

  // One coverage card — uses the clip's REAL screenshot + REAL metrics.
  const card = (c, featured) => {
    const da = +c.domainAuthority || 0;
    const dom = extractDomain(c.url || '');
    const logo = logoFor(c);
    const date = c.date ? fmtDate(c.date) : '';
    const isVideo = c.type === 'youtube' || c.type === 'broadcast';
    const badge = da > 0
      ? `<span class="rb-da"><small>DA</small>${da}</span>`
      : (c.type && c.type !== 'online' ? `<span class="rb-type">${esc(c.type === 'youtube' ? 'Video' : c.type)}</span>` : '');
    const m3 = da > 0
      ? `<div class="rb-m"><b>${da}</b><span>Authority</span></div>`
      : `<div class="rb-m"><b>${fmtV(c.socialShares)}</b><span>${isVideo ? 'Engagements' : 'Social'}</span></div>`;
    const metrics = `<div class="rb-metrics">
        <div class="rb-m"><b>${fmtV(c.estimatedViews)}</b><span>Views</span></div>
        <div class="rb-m"><b>${fmtV(c.reach)}</b><span>Reach</span></div>
        ${m3}
      </div>`;
    const ol = `<div class="rb-ol">${logo ? `<img src="${logo}" alt="" onerror="this.style.display='none'">` : ''}<span class="rb-name">${esc(c.outlet || dom || 'Coverage')}</span>${date ? `<span class="rb-date">${esc(date)}</span>` : ''}</div>`;
    const open = c.url ? ` onclick="window.open('${esc(c.url)}','_blank','noopener')" style="cursor:pointer;"` : '';
    if (featured) {
      const excerpt = c.pullQuote || c.notes || '';
      const link = c.url ? `<a class="rb-link" href="${esc(c.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Read article <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 17 17 7M9 7h8v8"/></svg></a>` : '';
      return `<article class="rb-card rb-feature"${open}>
        <div class="rb-shot">${screenshotImg(c, { style:'width:100%;height:100%;object-fit:cover;object-position:top;display:block;' })}${badge}</div>
        <div class="rb-body">
          <div class="rb-tag">Top Placement</div>
          ${ol}
          <h3 class="rb-h rb-h-lead">${esc(c.title || 'Untitled')}</h3>
          ${excerpt ? `<p class="rb-ex">${esc(excerpt)}</p>` : ''}
          ${metrics}
          ${link ? `<div class="rb-foot">${link}</div>` : ''}
        </div>
      </article>`;
    }
    return `<article class="rb-card"${open}>
      <div class="rb-shot">${screenshotImg(c, { style:'width:100%;height:100%;object-fit:cover;object-position:top;display:block;' })}${badge}</div>
      <div class="rb-body">
        ${ol}
        <h3 class="rb-h">${esc(c.title || 'Untitled')}</h3>
        ${metrics}
      </div>
    </article>`;
  };

  const featured = sortedClips[0];
  const rest = sortedClips.slice(1);

  // Coverage timeline (chronological)
  const dated = clips.filter(c => c.date).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const timelineSection = dated.length > 1 ? `
    <div class="rb-sec"><h2>Coverage Timeline</h2><span>Earliest to latest</span></div>
    <div class="rb-panel rb-tl">
      ${dated.map(c => {
        const dom = extractDomain(c.url || '');
        const logo = logoFor(c);
        return `<div class="rb-tlrow">
          <div class="rb-tldate">${esc(fmtDateShort(c.date))}</div>
          <div class="rb-tldot"></div>
          <div class="rb-tlbody">${logo ? `<img src="${logo}" alt="" onerror="this.style.display='none'">` : ''}<span class="rb-tlname">${esc(c.outlet || dom)}</span><span class="rb-tltitle">${esc(c.title || '')}</span></div>
        </div>`;
      }).join('')}
    </div>` : '';

  // Reach by outlet (estimated audience distribution)
  const reachByOutlet = {};
  clips.forEach(c => { const o = c.outlet || extractDomain(c.url || '') || 'Unknown'; reachByOutlet[o] = (reachByOutlet[o] || 0) + (+c.reach || 0); });
  const ro = Object.entries(reachByOutlet).filter(x => x[1] > 0).sort((a, b) => b[1] - a[1]);
  const maxRo = ro.length ? Math.max(...ro.map(x => x[1]), 1) : 1;
  const distributionSection = ro.length > 1 ? `
    <div class="rb-sec"><h2>Reach by Outlet</h2><span>Estimated audience</span></div>
    <div class="rb-panel rb-dist">
      ${ro.map(([o, v]) => `<div class="rb-distrow">
        <div class="rb-distname">${esc(o)}</div>
        <div class="rb-distbar"><span style="width:${Math.max(3, Math.round(v / maxRo * 100))}%;"></span></div>
        <div class="rb-distval">${fmt(v) || '—'}</div>
      </div>`).join('')}
    </div>` : '';

  return `
  <nav class="no-print" aria-label="Report" style="background:#1a1815;color:#fff;position:sticky;top:0;z-index:10;">
    <div class="wrap flex-between" style="padding:12px 32px;">
      <button onclick="go('book','${b.id}')" class="flex gap-2" style="font-size:.74rem;color:rgba(255,255,255,0.55);letter-spacing:0.005em;transition:color var(--t) var(--ease);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.55)'">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        Back to book
      </button>
      <div class="flex gap-2">
        <button onclick="publishReport('${b.id}')" class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.25);" title="Publish to a shareable link">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share link
        </button>
        <button onclick="window.print()" style="background:#fff;color:#1a1815;padding:8px 16px;border-radius:var(--radius);font-size:.74rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;letter-spacing:0.005em;">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
          Save as PDF
        </button>
      </div>
    </div>
  </nav>

  <main class="report" style="background:#efeeea;box-shadow:none;max-width:none;margin:0;padding:0;--rb-accent:${accent};">
    <style>
      .rb-wrap{max-width:1080px;margin:0 auto;padding:34px 28px 64px;}
      .rb-panel{background:#fff;border:1px solid #e9e6df;border-top:3px solid ${accent};border-radius:16px;box-shadow:0 1px 2px rgba(20,24,28,.04),0 10px 34px rgba(20,24,28,.06);overflow:hidden;}

      .rb-brand{display:flex;align-items:center;gap:17px;}
      .rb-logo{width:54px;height:54px;border-radius:13px;background:#fff;border:1px solid #e9e6df;display:grid;place-items:center;overflow:hidden;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.04);}
      .rb-logo img{width:100%;height:100%;object-fit:contain;padding:9px;}

      .rb-title{font-family:var(--font-display);font-weight:400;font-size:2rem;letter-spacing:-.02em;line-height:1.05;margin-top:4px;color:var(--ink);}
      .rb-meta{text-align:right;font-size:.74rem;line-height:1.7;color:var(--ink-3);}
      .rb-meta b{display:block;color:var(--ink-2);font-weight:600;font-size:.8rem;}
      .rb-summary{display:grid;grid-template-columns:repeat(${s.avgDA>0?5:4},1fr);}
      .rb-sum{padding:22px 28px;border-right:1px solid #f2f0ea;}
      .rb-sum:last-child{border-right:none;}
      .rb-sum b{display:block;font-family:var(--font-mono);font-size:1.7rem;font-weight:500;letter-spacing:-.02em;line-height:1;color:var(--ink);}
      .rb-sum span{display:block;font-size:.57rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-top:9px;}
      .rb-sec{display:flex;align-items:baseline;justify-content:space-between;margin:40px 4px 18px;}
      .rb-sec h2{font-family:var(--font-display);font-weight:400;font-size:1.3rem;letter-spacing:-.01em;color:var(--ink);}
      .rb-sec span{font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);}
      .rb-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;}

      .rb-link{font-size:.66rem;font-weight:600;letter-spacing:.04em;color:${accent};text-transform:uppercase;display:inline-flex;align-items:center;gap:5px;text-decoration:none;}
      .rb-src{font-size:.55rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);opacity:.8;margin-left:auto;}
      .rb-feature{grid-column:1 / -1;display:grid;grid-template-columns:1.18fr 1fr;}
      .rb-feature .rb-shot{aspect-ratio:auto;border-bottom:none;border-right:1px solid #e9e6df;min-height:300px;}
      .rb-feature .rb-body{padding:30px 32px;justify-content:flex-start;gap:13px;}
      .rb-tag{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:${accent};}

    <div class="rb-wrap">
      ${clips.length === 0 ? `
        <div class="rb-panel" style="padding:60px;text-align:center;">

        <div class="rb-panel">
          <div class="rb-ptop">
            <div class="rb-brand">
              ${b.clientLogo ? `<div class="rb-logo"><img src="${b.clientLogo}" alt="" onerror="this.parentNode.style.display='none'"></div>` : ''}
              <div>
                <div class="rb-eyebrow">PR Coverage Report</div>
                <div class="rb-title">${esc(b.name)}</div>
              </div>
            </div>
            <div class="rb-meta"><b>${esc(settings.agency)}</b>Prepared ${esc(today)}${settings.agencyUrl ? `<br>${esc(settings.agencyUrl)}` : ''}</div>

          </div>
        </div>

        <div class="rb-sec"><h2>Coverage</h2><span>${s.clips} placement${s.clips===1?'':'s'}</span></div>
        <div class="rb-grid">
          ${featured ? card(featured, true) : ''}
          ${rest.map(c => card(c, false)).join('')}
        </div>

        ${timelineSection}
        ${distributionSection}

        <div class="rb-foot-cred">Prepared by ${esc(settings.agency)}${b.client ? ` for ${esc(b.client)}` : ''} · ${monthLabel} · Generated with Clippings</div>
      `}
    </div>
  </main>`;
}

// Helper: hex color to r,g,b string
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `${r},${g},${b}`;
}

// Lighten (amt > 0) or darken (amt < 0) a hex color. amt in [-1, 1].
// Derives on-brand tints/shades from a single accent so the report
// stays cohesive for any client color.
function shadeHex(hex, amt) {
  if (!/^#[0-9a-f]{6}$/i.test(hex)) return hex;
  const ch = i => parseInt(hex.slice(i, i+2), 16);
  const f = n => Math.max(0, Math.min(255, Math.round(amt < 0 ? n * (1 + amt) : n + (255 - n) * amt)));
  return '#' + [ch(1), ch(3), ch(5)].map(n => f(n).toString(16).padStart(2, '0')).join('');
}

// MODALS
// ═══════════════════════════════════════════════════════════════════
function openModal(html) {
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

// Custom confirmation modal (replaces browser confirm())
function confirmAction(message, description, onConfirm, destructive = true) {
  openModal(`
  <div style="padding:36px 36px 28px;">
    <h2 style="font-family:var(--font-display);font-size:1.65rem;font-weight:400;letter-spacing:-.018em;margin-bottom:10px;line-height:1.15;">${message}</h2>
    ${description ? `<p style="font-size:.86rem;color:var(--ink-2);line-height:1.55;">${description}</p>` : ''}
    <div style="display:flex;gap:10px;margin-top:28px;padding-top:20px;border-top:1px solid var(--rule);">
      <button onclick="closeModal()" class="btn btn-ghost" style="flex:1;">Cancel</button>
      <button onclick="closeModal();(${onConfirm.toString()})()" class="btn" style="flex:1;background:${destructive ? 'var(--red)' : 'var(--ink)'};color:#fff;">${destructive ? 'Delete' : 'Confirm'}</button>
    </div>
  </div>`);
}

const CURRENCY_SYMBOLS = { PHP: '₱', USD: '$', EUR: '€', GBP: '£', SGD: 'S$', AUD: 'A$' };

function fmtMoney(n, cur) {
  const sym = CURRENCY_SYMBOLS[cur] || (cur ? cur + ' ' : '');
  return sym + (Math.round((+n || 0) * 100) / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function nextInvoiceNumber() {
  const nums = books.map(b => b.invoice?.number || '').map(s => { const m = String(s).match(/(\d+)\s*$/); return m ? +m[1] : 0; });
  const max = nums.length ? Math.max(0, ...nums) : 0;
  return 'INV-' + String(max + 1).padStart(4, '0');
}

function defaultInvoice(b) {
  const today = new Date();
  const due = new Date(); due.setDate(due.getDate() + 14);
  const iso = d => d.toISOString().slice(0, 10);
  return {
    number: nextInvoiceNumber(),
    issueDate: iso(today),
    dueDate: iso(due),
    billToName: b.client || '',
    billToEmail: '',
    billToAddress: '',
    items: [{ desc: `PR Coverage Report — ${b.name}`, qty: 1, rate: 0 }],
    taxPct: 0,
    discountAmount: 0,
    discountLabel: '',
    notes: 'Payment due within 14 days. Thank you for your business.',
    paymentDetails: settings.paymentDetails || '',
    currency: settings.currency || 'PHP',
    status: 'draft',
  };
}

function invoiceItemRowHtml(it) {
  it = it || { desc: '', qty: 1, rate: 0, note: '' };
  return `

      <div style="display:grid;grid-template-columns:1fr 56px 100px 26px;gap:8px;align-items:center;">

        <input class="input inv-rate" type="number" min="0" step="0.01" value="${esc(String(it.rate))}" style="text-align:right;">
        <button type="button" onclick="this.closest('.inv-row').remove()" aria-label="Remove line" style="color:var(--ink-3);font-size:1.2rem;line-height:1;padding:4px;">×</button>
      </div>
      <textarea class="input inv-note" rows="1" placeholder="Sub-note (optional) — e.g. placements list" style="margin-top:6px;font-size:.78rem;resize:vertical;font-family:inherit;line-height:1.45;">${esc(it.note || '')}</textarea>
    </div>`;
}

function addInvoiceItemRow() {

// Live USD→quote exchange rate (free APIs, no key). Used by the retainer
// template so there's no manual Google lookup each month.
async function fetchUsdRate(quote) {
  quote = (quote || 'PHP').toUpperCase();
  const sources = [
    'https://open.er-api.com/v6/latest/USD',
    `https://api.frankfurter.app/latest?from=USD&to=${quote}`,
  ];
  for (const u of sources) {
    try {
      const r = await fetch(u);
      const j = await r.json();
      const rate = j && j.rates && j.rates[quote];
      if (rate) return +rate;
    } catch {}
  }
  return null;
}

function updatePickerTotal(bookId, rate) {
  const cur = (_retainerCtx && _retainerCtx.currency) || settings.currency || 'PHP';
  const sym = CURRENCY_SYMBOLS[cur] || (cur + ' ');
  const retUSD = +settings.retainerUSD || 1500, perUSD = +settings.perPlacementUSD || 200, discUSD = +settings.toolsDiscountUSD || 35;
  const n = document.querySelectorAll('.pick-clip:checked').length;
  const subUSD = retUSD + perUSD * n - discUSD;
  const money = x => sym + (Math.round(x*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const el = document.getElementById('picker-total');
  if (el) el.innerHTML =
    `Retainer <strong>${retUSD.toLocaleString()} USD</strong> · Performance <strong>${perUSD} × ${n}</strong> · − tools <strong>${discUSD} USD</strong>`
    + `<br><span style="font-size:1.05rem;font-weight:700;color:var(--ink);">≈ ${money(subUSD*rate)}</span> <span style="color:var(--ink-3);">(${(retUSD+perUSD*n-discUSD).toLocaleString()} USD @ ${sym}${Math.round(rate*100)/100})</span>`;
}

// Step 3: build the invoice from the ticked placements + live rate.
function generateRetainerInvoice(bookId, rate) {
  const b = books.find(x => x.id === bookId);
  if (!b) return;
  const cur = (_retainerCtx && _retainerCtx.currency) || settings.currency || 'PHP';
  const sym = CURRENCY_SYMBOLS[cur] || (cur + ' ');
  const r2 = Math.round(rate * 100) / 100;
  const round2 = x => Math.round(x * 100) / 100;
  const retUSD = +settings.retainerUSD || 1500, perUSD = +settings.perPlacementUSD || 200, discUSD = +settings.toolsDiscountUSD || 35;
  const picked = [...document.querySelectorAll('.pick-clip:checked')].map(c => b.clips[+c.dataset.i]).filter(Boolean);
  const n = picked.length;
  const placementsNote = n ? 'Placements:\n' + picked.map((c, i) => `${i+1}. ${c.outlet || extractDomain(c.url||'')} — ${c.title || ''}`).join('\n') : '';
  const ctx = _retainerCtx || {};
  const items = [
    { desc: `Retainer Service Fee`, note: `Monthly Retainer = ${retUSD.toLocaleString()} USD · 1 USD = ${sym}${r2}`, qty: 1, rate: round2(retUSD * rate) },
  ];
  if (n > 0) items.push({ desc: `Performance Fee`, note: `${perUSD} USD per placement · 1 USD = ${sym}${r2}\n${placementsNote}`, qty: n, rate: round2(perUSD * rate) });
  b.invoice = {
    number: ctx.number || nextInvoiceNumber(),
    issueDate: ctx.issueDate || new Date().toISOString().slice(0,10),
    dueDate: ctx.dueDate || new Date(Date.now()+14*864e5).toISOString().slice(0,10),
    billToName: ctx.billToName || b.client || '',
    billToEmail: ctx.billToEmail || '',
    billToAddress: ctx.billToAddress || '',
    items,
    taxPct: 0,
    discountAmount: round2(discUSD * rate),
    discountLabel: `Tools credit (${discUSD} USD)`,
    notes: ctx.notes || 'Payment due within 14 days. Thank you for your business.',
    paymentDetails: ctx.paymentDetails || settings.paymentDetails || '',
    currency: cur,
    status: (b.invoice && b.invoice.status) || 'draft',
  };
  if (b.invoice.status === 'draft' && b.invoice && b.invoice.paidAt) delete b.invoice.paidAt;
  save();
  go('invoice', bookId);
  toast(`${n} placement${n!==1?'s':''} billed · 1 USD = ${sym}${r2}`);
}

function collectInvoice() {
  const items = [...document.querySelectorAll('#inv-items .inv-row')].map(r => ({
    desc: r.querySelector('.inv-desc').value.trim(),
    qty: +r.querySelector('.inv-qty').value || 0,
    rate: +r.querySelector('.inv-rate').value || 0,
    note: (r.querySelector('.inv-note')?.value || '').trim(),
  })).filter(it => it.desc);
  return {
    number: document.getElementById('inv-number')?.value?.trim() || '',
    issueDate: document.getElementById('inv-issue')?.value || '',
    dueDate: document.getElementById('inv-due')?.value || '',
    billToName: document.getElementById('inv-name')?.value?.trim() || '',
    billToEmail: document.getElementById('inv-email')?.value?.trim() || '',
    billToAddress: document.getElementById('inv-address')?.value?.trim() || '',
    items: items.length ? items : [{ desc: 'Services', qty: 1, rate: 0 }],
    taxPct: +document.getElementById('inv-tax')?.value || 0,
    discountAmount: +document.getElementById('inv-discount')?.value || 0,
    discountLabel: document.getElementById('inv-disclabel')?.value?.trim() || '',
    currency: document.getElementById('inv-currency')?.value?.trim() || 'PHP',
    notes: document.getElementById('inv-notes')?.value?.trim() || '',
    paymentDetails: document.getElementById('inv-payment')?.value?.trim() || '',
    status: 'draft',
  };
}

function saveInvoice(bookId, preview) {
  const b = books.find(x => x.id === bookId);
  if (!b) return;
  const prev = b.invoice || {};
  b.invoice = collectInvoice();
  b.invoice.status = prev.status || 'draft';     // keep status across edits
  if (prev.paidAt) b.invoice.paidAt = prev.paidAt;
  save();
  closeModal();
  if (preview) go('invoice', bookId);
  else toast('Invoice draft saved');
}

function invoiceTotals(inv) {
  const subtotal = (inv.items || []).reduce((s, it) => s + (+it.qty || 0) * (+it.rate || 0), 0);
  const discountAmount = Math.min(+inv.discountAmount || 0, subtotal);
  const taxable = subtotal - discountAmount;
  const tax = taxable * ((+inv.taxPct || 0) / 100);
  return { subtotal, discountAmount, tax, total: taxable + tax };
}

function emailInvoice(bookId) {
  const b = books.find(x => x.id === bookId);
  if (!b || !b.invoice) return;
  const inv = b.invoice;
  const { total } = invoiceTotals(inv);
  const subject = `Invoice ${inv.number} — ${settings.agency}`;
  const body = `Hi ${inv.billToName || ''},\n\nPlease find invoice ${inv.number} for ${b.name}.\nAmount due: ${fmtMoney(total, inv.currency)}\nDue date: ${fmtDate(inv.dueDate)}\n\nThank you,\n${settings.agency}`;
  const to = encodeURIComponent(inv.billToEmail || '');
  window.location.href = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

// Cycle the invoice status: Draft → Sent → Paid → Draft.
function cycleInvoiceStatus(bookId) {
  const b = books.find(x => x.id === bookId);
  if (!b || !b.invoice) return;
  const order = ['draft', 'sent', 'paid'];
  const cur = order.indexOf(b.invoice.status || 'draft');
  b.invoice.status = order[(cur + 1) % order.length];
  if (b.invoice.status === 'paid') b.invoice.paidAt = new Date().toISOString();
  save(); render();
  toast(`Marked ${b.invoice.status}`);
}

// SHAREABLE REPORT LINK (requires backend)
// ═══════════════════════════════════════════════════════════════════
async function publishReport(bookId) {
  const base = backendBase();
  if (!base) { toast('Connect your backend in Settings to publish a shareable link'); openSettingsModal(); return; }
  const b = books.find(x => x.id === bookId);
  if (!b) return;
  const main = document.querySelector('main.report');
  if (!main) { toast('Open the report first'); return; }
  // Self-contained HTML: fonts + the app's inline stylesheet + the report.
  const fonts = Array.from(document.querySelectorAll('link[rel="preconnect"], link[href*="fonts.googleapis"]')).map(l => l.outerHTML).join('');
  const styleTag = document.querySelector('style')?.outerHTML || '';
  const title = b.client || b.name || 'Coverage Report';
  const html = `<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${esc(title)} — Coverage Report</title>${fonts}${styleTag}</head><body style="background:var(--paper);margin:0;">${main.outerHTML}</body></html>`;
  toast('Publishing…');
  try {
    const r = await fetch(`${base}/api/reports/publish`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...(settings.apiToken ? { 'X-Clippings-Token': settings.apiToken } : {}) },
      body: JSON.stringify({ slug: b.publishedSlug || undefined, title, html }),
    });
    const j = await r.json();
    if (j.ok) { b.publishedSlug = j.slug; b.publishedUrl = j.url; save(); showShareModal(j.url, !!b.publishedSlug); }
    else toast(j.error || 'Could not publish — check your token/backend');
  } catch { toast('Could not reach the backend.'); }
}

function showShareModal(url, isUpdate) {
  openModal(`

    <h2 style="font-family:var(--font-display);font-size:1.7rem;font-weight:400;letter-spacing:-.02em;margin-bottom:8px;">Report ${isUpdate ? 'updated' : 'published'}</h2>

}

async function doFetch(bookId) {
  const url = document.getElementById('f-url')?.value?.trim();
  if (!url) { alert('Enter a URL first'); return; }
  const btn = document.getElementById('fetch-btn');
  const msg = document.getElementById('fetch-msg');
  btn.textContent = 'Fetching...'; btn.disabled = true;
  msg.textContent = 'Getting metadata and screenshot...';

  try {
    // 1. Fetch metadata + screenshot via Microlink
    const meta = await fetchMicrolink(url);
    if (meta.title) document.getElementById('f-title').value = meta.title;
    if (meta.outlet) document.getElementById('f-outlet').value = meta.outlet;
    if (meta.date) document.getElementById('f-date').value = meta.date;
    if (meta.screenshot) {
      document.getElementById('f-screenshot').value = meta.screenshot;
      document.getElementById('ss-img').src = meta.screenshot;
      document.getElementById('ss-preview').style.display = 'block';
    }

    // 2. Get outlet logo
    const domain = extractDomain(url);
    const logo = outletLogoUrl(domain);
    document.getElementById('f-logo').value = logo;

    msg.textContent = 'Got metadata. Fetching domain metrics...';

    // 3. Fetch PageRank / DA
    if (settings.oprKey) {
      const pr = await fetchPageRank(domain);
      if (pr.pageRank > 0) {
        const da = daFromPageRank(pr.pageRank);
        document.getElementById('f-da').value = da;
        document.getElementById('f-pagerank').value = pr.pageRank;
        // Calculate estimated views
        const social = +document.getElementById('f-social')?.value || 0;
        const views = estimateViews(pr.pageRank, social);
        document.getElementById('f-views').value = views;
        // Estimate reach from traffic
        const traffic = estimateMonthlyTraffic(pr.pageRank);
        if (!document.getElementById('f-reach').value) {
          document.getElementById('f-reach').value = traffic;
        }
        msg.textContent = `Done! DA: ${da}, Est. Views: ${fmt(views)}`;
      } else {
        msg.textContent = 'Metadata captured. PageRank not available for this domain.';
      }
    } else {
      msg.textContent = 'Metadata captured. Add an API key in Settings for auto DA scores.';
    }
  } catch(e) {
    msg.textContent = 'Could not auto-fetch. Fill in manually.';
  }
  btn.textContent = 'Re-fetch'; btn.disabled = false;
}

async function testBackend() {
  const url = document.getElementById('s-backend')?.value?.trim() || '';
  const msg = document.getElementById('s-backend-msg');
  if (!url) { if (msg) { msg.textContent = 'Enter your backend URL first.'; msg.style.color = 'var(--ink-2)'; } return; }
  let base = /^https?:\/\//i.test(url) ? url : 'https://' + url;
  base = base.replace(/\/+$/, '');
  if (msg) { msg.textContent = 'Connecting…'; msg.style.color = 'var(--ink-3)'; }
  try {
    const r = await fetch(base + '/api/health');
    const j = await r.json();
    if (j.ok) {
      const on = [j.openpagerank && 'OpenPageRank', j.similarweb && 'SimilarWeb'].filter(Boolean);
      if (msg) { msg.innerHTML = `Connected ✓ &nbsp; Monitoring every ${j.checkEveryMinutes} min · ${on.length ? on.join(', ') + ' active' : 'no data keys set on server yet'}`; msg.style.color = '#2d7a4a'; }
    } else throw new Error('bad response');
  } catch (e) {
    if (msg) { msg.textContent = 'Could not reach that backend. Check the URL is live and includes https://.'; msg.style.color = 'var(--red)'; }
  }
}

function removeMonitor(bookId, idx) {

  if (!b || !b.monitors) return;
  b.monitors.splice(idx, 1);
  save(); render();
}

async function checkRSS(bookId, monitorIdx, quiet) {
  const b = books.find(x => x.id === bookId);
  if (!b || !b.monitors?.[monitorIdx]) return 0;
  const m = b.monitors[monitorIdx];
  if (!quiet) toast(`Checking "${m.keyword}"...`);

  try {
    const r = await proxyFetch(m.rssUrl);
    const text = await r.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const items = xml.querySelectorAll('item');

    if (!b.pending) b.pending = [];
    const existingUrls = new Set([
      ...b.clips.map(c => c.url),
      ...b.pending.map(p => p.url),
    ]);

    let added = 0;
    items.forEach(item => {
      const link = item.querySelector('link')?.textContent?.trim();
      const title = item.querySelector('title')?.textContent?.trim();
      const sourceEl = item.querySelector('source');
      const source = sourceEl?.textContent?.trim();
      const sourceUrl = sourceEl?.getAttribute('url') || '';
      const pubDate = item.querySelector('pubDate')?.textContent?.trim();

      if (link && !existingUrls.has(link)) {
        let dateStr = '';
        if (pubDate) {
          try { dateStr = new Date(pubDate).toISOString().slice(0,10); } catch {}
        }
        b.pending.push({
          url: link, title: title || '', outlet: source || extractDomain(link),
          outletUrl: sourceUrl,
          date: dateStr, keyword: m.keyword, foundAt: new Date().toISOString(),
        });
        existingUrls.add(link);
        added++;
      }
    });

    m.lastChecked = new Date().toISOString();
    save();
    if (!quiet) { render(); toast(added > 0 ? `Found ${added} new mention${added>1?'s':''}` : 'No new mentions found'); }
    return added;
  } catch(e) {
    if (!quiet) toast('Could not fetch RSS. Try again later.');
    return 0;
  }
}

async function checkAllRSS(bookId) {
  const b = books.find(x => x.id === bookId);
  if (!b || !b.monitors) return;
  for (let i = 0; i < b.monitors.length; i++) {
    await checkRSS(bookId, i);
  }
}

// Background monitoring: silently re-check every monitor that is stale
// (not checked within the threshold) across all books. Runs on load and
// on an interval while the app is open.
let _autoMonitorRunning = false;
async function autoMonitorAll(force) {
  if (_autoMonitorRunning) return;
  _autoMonitorRunning = true;
  let totalNew = 0;
  try {
    if (backendBase()) {
      // Backend monitors 24/7 — just sync our keywords and pull results.
      await syncMonitorsToBackend();
      totalNew = await pullBackendMentions();
    } else {
      // Browser-only mode: check each stale monitor directly.
      const THRESHOLD = 30 * 60 * 1000; // 30 minutes
      const now = Date.now();
      for (const b of books) {
        if (!b.monitors || !b.monitors.length) continue;
        for (let i = 0; i < b.monitors.length; i++) {
          const m = b.monitors[i];
          const last = m.lastChecked ? new Date(m.lastChecked).getTime() : 0;
          if (force || now - last > THRESHOLD) {
            totalNew += await checkRSS(b.id, i, true);
          }
        }
      }
    }
  } finally {
    _autoMonitorRunning = false;
  }
  if (totalNew > 0) {
    render();
    toast(`Monitoring found ${totalNew} new mention${totalNew>1?'s':''} across your clients`);
  }
  return totalNew;
}

// Total unreviewed mentions across all books (for the global badge).
function totalPendingCount() {
  return books.reduce((s, b) => s + (b.pending?.length || 0), 0);
}

function approvePending(bookId, idx) {
  const b = books.find(x => x.id === bookId);
  if (!b || !b.pending?.[idx]) return;
  const p = b.pending[idx];
  // Use the article's real source domain for the favicon (Google News
  // URLs would otherwise yield Google's icon).
  const logoDomain = extractDomain(p.outletUrl || p.url || '');
  // Add as a clip (user can edit details later)
  b.clips.unshift({
    id: uid(), url: p.url, title: p.title, outlet: p.outlet, date: p.date,
    outletLogo: logoDomain ? outletLogoUrl(logoDomain) : '',
    screenshot: '', domainAuthority: 0, pageRank: 0, estimatedViews: 0,
    reach: 0, socialShares: 0, type: 'online',
    adValue: 0, notes: `via monitor: ${p.keyword}`, addedAt: new Date().toISOString(),
  });
  b.pending.splice(idx, 1);
  save(); render();
  toast('Added to coverage book');
}

function dismissPending(bookId, idx) {
  const b = books.find(x => x.id === bookId);
  if (!b || !b.pending) return;
  b.pending.splice(idx, 1);
  save(); render();
}

function dismissAllPending(bookId) {
  const b = books.find(x => x.id === bookId);
  if (!b) return;
  const count = (b.pending || []).length;
  confirmAction('Dismiss all pending?', `${count} pending mention${count !== 1 ? 's' : ''} will be dismissed.`, () => {
    const b2 = books.find(x => x.id === bookId);
    if (!b2) return;
    b2.pending = [];
    save(); render();
  }, false);
}

function exportJSON() {
  const json = JSON.stringify({ books, settings }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `clippings-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Backup exported');
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.books) { alert('Invalid backup file'); return; }
      confirmAction('Import backup?', `${data.books.length} book(s) will be merged with your existing data.`, () => {
        const existing = new Set(books.map(b => b.id));
        data.books.forEach(b => { if (!existing.has(b.id)) books.push(b); });
        if (data.settings) settings = { ...settings, ...data.settings };
        save(); render();
        toast(`Imported ${data.books.length} book(s)`);
      }, false);
    } catch { alert('Could not read file.'); }
  };
  reader.readAsText(file);
}

function exportCSV(bookId) {
  const b = books.find(x => x.id === bookId);
  if (!b) return;
  const clips = b.clips || [];
  const headers = ['Report','Client','Title','URL','Date','Type','Outlet','Domain Authority','Est. Views','Audience','Social Shares','Ad Value ($)','Notes'];
  const rows = clips.map(c => [
    b.name, b.client, c.title, c.url, c.date, c.type, c.outlet,
    c.domainAuthority, c.estimatedViews, c.reach, c.socialShares,
    c.adValue, c.notes,
  ]);

  const csvContent = [headers, ...rows].map(row =>
    row.map(cell => {
      const s = String(cell || '');
      return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(',')
  ).join('\n');

  const blob = new Blob([csvContent], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${b.name.replace(/[^a-zA-Z0-9]/g,'-')}-coverage.csv`;
  a.click();
  toast('CSV exported');
}

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      const rows = parseCSV(text);
      if (rows.length < 2) { alert('CSV appears empty or has no data rows.'); return; }
      const headers = rows[0].map(h => h.toLowerCase().trim());
      const data = rows.slice(1).filter(r => r.some(cell => cell.trim()));

      const b = books.find(x => x.id === bookId);
      if (!b) return;

      const col = name => {
        const variants = {
          'title': ['title','headline'],
          'url': ['url','link'],
          'date': ['date','published','pub date'],
          'type': ['type','coverage type'],
          'outlet': ['outlet','publication','source'],
          'da': ['domain authority','da','authority'],
          'views': ['est. views','estimated views','views'],
          'reach': ['audience','reach','monthly visits','unique visits'],
          'social': ['social shares','social','shares','engagements'],
          'advalue': ['ad value','ad value ($)','ave','advertising value'],
          'notes': ['notes','note','comments'],
        };
        const v = variants[name] || [name];
        return headers.findIndex(h => v.some(k => h.includes(k)));
      };

      const iTitle = col('title'), iUrl = col('url'), iDate = col('date'),
            iType = col('type'), iOutlet = col('outlet'), iDA = col('da'),
            iViews = col('views'), iReach = col('reach'), iSocial = col('social'),
            iAV = col('advalue'), iNotes = col('notes');

      let added = 0;
      data.forEach(row => {
        const g = i => (i >= 0 && i < row.length) ? row[i].trim() : '';
        const url = g(iUrl);
        const title = g(iTitle);
        if (!url && !title) return;
        const domain = url ? extractDomain(url) : '';
        b.clips.push({
          id: uid(), url, title,
          outlet: g(iOutlet) || (domain ? domain : ''),
          outletLogo: domain ? outletLogoUrl(domain) : '',
          date: g(iDate) || '',
          domainAuthority: +g(iDA) || 0,
          pageRank: 0,
          estimatedViews: +g(iViews) || 0,
          reach: +g(iReach) || 0,
          socialShares: +g(iSocial) || 0,
          type: g(iType) || 'online',
          adValue: +g(iAV).replace(/[^0-9.]/g,'') || 0,
          notes: g(iNotes) || '',
          screenshot: '',
          addedAt: new Date().toISOString(),
        });
        added++;
      });
      save(); render();
      toast(`Imported ${added} clip(s) from CSV`);
    } catch(err) { alert('Could not parse CSV: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

function parseCSV(text) {
  const rows = []; let row = []; let cell = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cell += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(cell); cell = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
        row.push(cell); cell = ''; rows.push(row); row = [];
        if (ch === '\r') i++;
      } else if (ch === '\r') {
        row.push(cell); cell = ''; rows.push(row); row = [];
      } else { cell += ch; }
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

// ═══════════════════════════════════════════════════════════════════
// SCROLL-ENTRY ANIMATION (IntersectionObserver)
// ═══════════════════════════════════════════════════════════════════
const scrollObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('in-view');
      scrollObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -32px 0px' });

function observeScrollEntries() {
  document.querySelectorAll('.scroll-entry:not(.in-view)').forEach(el => {
    scrollObserver.observe(el);
  });
}

// Wrap render to observe after DOM update
const _baseRender = render;
render = function() {
  _baseRender();
  requestAnimationFrame(observeScrollEntries);
};

async function _fetchDemoScreenshots(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  let updated = 0;
  for (const clip of book.clips) {
    if (clip.screenshot) continue;
    // Video clips: use the real YouTube thumbnail, skip Microlink.
    const yt = youtubeThumbs(clip.url);
    if (yt.length) {
      clip.screenshot = yt[0];
      updated++;
      save();
      render();
      continue;
    }
    try {
      const meta = await fetchMicrolink(clip.url);
      if (meta.screenshot) {
        clip.screenshot = meta.screenshot;
        updated++;
        save();
        render();
      }
    } catch {}
  }
  if (updated > 0) toast(updated + ' screenshot' + (updated > 1 ? 's' : '') + ' loaded');
}
