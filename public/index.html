async function doFetch(bookId) {
  const url = document.getElementById('f-url')?.value?.trim();
  if (!url) { alert('Enter a URL first'); return; }
  const btn = document.getElementById('fetch-btn');
  const msg = document.getElementById('fetch-msg');
  btn.textContent = 'Fetching...'; btn.disabled = true;
  msg.textContent = 'Getting metadata and screenshot...';

  try {
    // 1. Fetch metadata + screenshot via Microlink
    const meta = await fetchMicrolink(url);
    if (meta.title) document.getElementById('f-title').value = meta.title;
    if (meta.outlet) document.getElementById('f-outlet').value = meta.outlet;
    if (meta.date) document.getElementById('f-date').value = meta.date;
    if (meta.screenshot) {
      document.getElementById('f-screenshot').value = meta.screenshot;
      document.getElementById('ss-img').src = meta.screenshot;
      document.getElementById('ss-preview').style.display = 'block';
    }

    // 2. Get outlet logo
    const domain = extractDomain(url);
    const logo = outletLogoUrl(domain);
    document.getElementById('f-logo').value = logo;

    msg.textContent = 'Got metadata. Fetching domain metrics...';

    // 3. Fetch PageRank / DA
    if (settings.oprKey) {
      const pr = await fetchPageRank(domain);
      if (pr.pageRank > 0) {
        const da = daFromPageRank(pr.pageRank);
        document.getElementById('f-da').value = da;
        document.getElementById('f-pagerank').value = pr.pageRank;
        // Calculate estimated views
        const social = +document.getElementById('f-social')?.value || 0;
        const views = estimateViews(pr.pageRank, social);
        document.getElementById('f-views').value = views;
        // Estimate reach from traffic
        const traffic = estimateMonthlyTraffic(pr.pageRank);
        if (!document.getElementById('f-reach').value) {
          document.getElementById('f-reach').value = traffic;
        }
        msg.textContent = `Done! DA: ${da}, Est. Views: ${fmt(views)}`;
      } else {
        msg.textContent = 'Metadata captured. PageRank not available for this domain.';
      }
    } else {
      msg.textContent = 'Metadata captured. Add an API key in Settings for auto DA scores.';
    }
  } catch(e) {
    msg.textContent = 'Could not auto-fetch. Fill in manually.';
  }
  btn.textContent = 'Re-fetch'; btn.disabled = false;
}

async function checkRSS(bookId, monitorIdx, quiet) {
  const b = books.find(x => x.id === bookId);
  if (!b || !b.monitors?.[monitorIdx]) return 0;
  const m = b.monitors[monitorIdx];
  if (!quiet) toast(`Checking "${m.keyword}"...`);

  try {
    const r = await proxyFetch(m.rssUrl);
    const text = await r.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const items = xml.querySelectorAll('item');

    if (!b.pending) b.pending = [];
    const existingUrls = new Set([
      ...b.clips.map(c => c.url),
      ...b.pending.map(p => p.url),
    ]);

    let added = 0;
    items.forEach(item => {
      const link = item.querySelector('link')?.textContent?.trim();
      const title = item.querySelector('title')?.textContent?.trim();
      const sourceEl = item.querySelector('source');
      const source = sourceEl?.textContent?.trim();
      const sourceUrl = sourceEl?.getAttribute('url') || '';
      const pubDate = item.querySelector('pubDate')?.textContent?.trim();

      if (link && !existingUrls.has(link)) {
        let dateStr = '';
        if (pubDate) {
          try { dateStr = new Date(pubDate).toISOString().slice(0,10); } catch {}
        }
        b.pending.push({
          url: link, title: title || '', outlet: source || extractDomain(link),
          outletUrl: sourceUrl,
          date: dateStr, keyword: m.keyword, foundAt: new Date().toISOString(),
        });
        existingUrls.add(link);
        added++;
      }
    });

    m.lastChecked = new Date().toISOString();
    const promoted = autoPromoteStrong(b);
    save();
    if (!quiet) { render(); toast(added > 0 ? `Found ${added} new mention${added>1?'s':''}${promoted ? ` · ${promoted} auto-added` : ''}` : 'No new mentions found'); }
    return added;
  } catch(e) {
    if (!quiet) toast('Could not fetch RSS. Try again later.');
    return 0;
  }
}

async function checkAllRSS(bookId) {

// Background monitoring: silently re-check every monitor that is stale
// (not checked within the threshold) across all books. Runs on load and
// on an interval while the app is open.
let _autoMonitorRunning = false;
async function autoMonitorAll(force) {
  if (_autoMonitorRunning) return;
  _autoMonitorRunning = true;
  let totalNew = 0;
  try {
    if (backendBase()) {
      // Backend monitors 24/7 — just sync our keywords and pull results.
      await syncMonitorsToBackend();
      totalNew = await pullBackendMentions();
    } else {
      // Browser-only mode: check each stale monitor directly.
      const THRESHOLD = 30 * 60 * 1000; // 30 minutes
      const now = Date.now();
      for (const b of books) {
        if (!b.monitors || !b.monitors.length) continue;
        for (let i = 0; i < b.monitors.length; i++) {
          const m = b.monitors[i];
          const last = m.lastChecked ? new Date(m.lastChecked).getTime() : 0;
          if (force || now - last > THRESHOLD) {
            totalNew += await checkRSS(b.id, i, true);
          }
        }
      }
    }
  } finally {
    _autoMonitorRunning = false;
  }
  if (totalNew > 0) {
    render();
    toast(`Monitoring found ${totalNew} new mention${totalNew>1?'s':''} across your clients`);
  }
  return totalNew;
}

// Total unreviewed mentions across all books (for the global badge).
function totalPendingCount() {

// Build a coverage clip from a pending mention (shared by manual approve + auto-add).
function clipFromPending(p, opts) {
  const logoDomain = extractDomain(p.outletUrl || p.url || '');
  return {
    id: uid(), url: p.url, title: p.title, outlet: p.outlet, date: p.date,
    outletLogo: logoDomain ? outletLogoUrl(logoDomain) : '',
    screenshot: '', domainAuthority: 0, pageRank: 0, estimatedViews: 0,
    reach: 0, socialShares: 0, type: 'online',
    adValue: 0, notes: `via monitor: ${p.keyword || ''}`,
    auto: !!(opts && opts.auto),
    addedAt: new Date().toISOString(),
  };
}
// ── Auto-add: strong-match hits go straight to coverage; the rest wait for review ──
function _normTxt(s) { return (s || '').toLowerCase().replace(/[.’']/g, '').replace(/\s+/g, ' ').trim(); }
function _brandPhrases(book) {
  const out = [];
  const nm = (book.client || book.name || '').trim();
  if (nm) out.push(nm);
  // also accept plain brand-name monitor keywords (no boolean operators, short)
  (book.monitors || []).forEach(m => {
    const k = (m.keyword || '').trim();
    if (k && !/\b(OR|AND|NOT)\b|["()]/.test(k) && k.split(/\s+/).length <= 4) out.push(k);
  });
  return [...new Set(out.map(_normTxt))].filter(ph => ph.length >= 3);
}
// A pending hit is a "strong match" only if a brand phrase appears in the HEADLINE
// (much stronger than a keyword match anywhere) — keeps the auto-added book clean.
function isStrongMatch(p, book) {
  const t = _normTxt(p.title);
  if (!t) return false;
  return _brandPhrases(book).some(ph => t.includes(ph));
}
// Promote every strong-match pending item in a book straight to coverage. Returns count.
function autoPromoteStrong(book) {
  if (!book || book.autoAdd === false || !book.pending || !book.pending.length) return 0;
  if (!book.clips) book.clips = [];
  const have = new Set(book.clips.map(c => c.url));
  const keep = []; let n = 0;
  for (const p of book.pending) {
    if (!have.has(p.url) && isStrongMatch(p, book)) {
      book.clips.unshift(clipFromPending(p, { auto: true }));
      have.add(p.url); n++;
    } else { keep.push(p); }
  }
  book.pending = keep;
  return n;
}
function toggleAutoAdd(bookId, on) {
  const b = books.find(x => x.id === bookId); if (!b) return;
  b.autoAdd = on;
  const n = on ? autoPromoteStrong(b) : 0;
  save(); render();
  toast(on ? (n ? `Auto-add on — ${n} moved into coverage` : 'Auto-add on for strong matches') : 'Auto-add off');
}

function approvePending(bookId, idx) {

function exportCSV(bookId) {
  const b = books.find(x => x.id === bookId);
  if (!b) return;
  const clips = b.clips || [];
  const headers = ['Report','Client','Title','URL','Date','Type','Outlet','Domain Authority','Est. Views','Audience','Social Shares','Ad Value ($)','Notes'];
  const rows = clips.map(c => [
    b.name, b.client, c.title, c.url, c.date, c.type, c.outlet,
    c.domainAuthority, c.estimatedViews, c.reach, c.socialShares,
    c.adValue, c.notes,
  ]);

  const csvContent = [headers, ...rows].map(row =>
    row.map(cell => {
      const s = String(cell || '');
      return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(',')
  ).join('\n');

  const blob = new Blob([csvContent], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${b.name.replace(/[^a-zA-Z0-9]/g,'-')}-coverage.csv`;
  a.click();
  toast('CSV exported');
}

// ═══════════════════════════════════════════════════════════════════
// CSV IMPORT
// ═══════════════════════════════════════════════════════════════════
function importCSV(bookId, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      const rows = parseCSV(text);
      if (rows.length < 2) { alert('CSV appears empty or has no data rows.'); return; }
      const headers = rows[0].map(h => h.toLowerCase().trim());
      const data = rows.slice(1).filter(r => r.some(cell => cell.trim()));

      const b = books.find(x => x.id === bookId);
      if (!b) return;

      const col = name => {
        const variants = {
          'title': ['title','headline'],
          'url': ['url','link'],
          'date': ['date','published','pub date'],
          'type': ['type','coverage type'],
          'outlet': ['outlet','publication','source'],
          'da': ['domain authority','da','authority'],
          'views': ['est. views','estimated views','views'],
          'reach': ['audience','reach','monthly visits','unique visits'],
          'social': ['social shares','social','shares','engagements'],
          'advalue': ['ad value','ad value ($)','ave','advertising value'],
          'notes': ['notes','note','comments'],
        };
        const v = variants[name] || [name];
        return headers.findIndex(h => v.some(k => h.includes(k)));
      };

      const iTitle = col('title'), iUrl = col('url'), iDate = col('date'),
            iType = col('type'), iOutlet = col('outlet'), iDA = col('da'),
            iViews = col('views'), iReach = col('reach'), iSocial = col('social'),
            iAV = col('advalue'), iNotes = col('notes');

      let added = 0;
      data.forEach(row => {
        const g = i => (i >= 0 && i < row.length) ? row[i].trim() : '';
        const url = g(iUrl);
        const title = g(iTitle);
        if (!url && !title) return;
        const domain = url ? extractDomain(url) : '';
        b.clips.push({
          id: uid(), url, title,
          outlet: g(iOutlet) || (domain ? domain : ''),
          outletLogo: domain ? outletLogoUrl(domain) : '',
          date: g(iDate) || '',
          domainAuthority: +g(iDA) || 0,
          pageRank: 0,
          estimatedViews: +g(iViews) || 0,
          reach: +g(iReach) || 0,
          socialShares: +g(iSocial) || 0,
          type: g(iType) || 'online',
          adValue: +g(iAV).replace(/[^0-9.]/g,'') || 0,
          notes: g(iNotes) || '',
          screenshot: '',
          addedAt: new Date().toISOString(),
        });
        added++;
      });
      save(); render();
      toast(`Imported ${added} clip(s) from CSV`);
    } catch(err) { alert('Could not parse CSV: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

function parseCSV(text) {
  const rows = []; let row = []; let cell = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cell += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(cell); cell = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
        row.push(cell); cell = ''; rows.push(row); row = [];
        if (ch === '\r') i++;
      } else if (ch === '\r') {
        row.push(cell); cell = ''; rows.push(row); row = [];
      } else { cell += ch; }
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

// ═══════════════════════════════════════════════════════════════════
// SCROLL-ENTRY ANIMATION (IntersectionObserver)
// ═══════════════════════════════════════════════════════════════════
const scrollObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('in-view');
      scrollObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -32px 0px' });

function observeScrollEntries() {
  document.querySelectorAll('.scroll-entry:not(.in-view)').forEach(el => {
    scrollObserver.observe(el);
  });
}

// Wrap render to observe after DOM update
const _baseRender = render;
render = function() {
  _baseRender();
  requestAnimationFrame(observeScrollEntries);
};

async function _fetchDemoScreenshots(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  let updated = 0;
  for (const clip of book.clips) {
    if (clip.screenshot) continue;
    // Video clips: use the real YouTube thumbnail, skip Microlink.
    const yt = youtubeThumbs(clip.url);
    if (yt.length) {
      clip.screenshot = yt[0];
      updated++;
      save();
      render();
      continue;
    }
    try {
      const meta = await fetchMicrolink(clip.url);
      if (meta.screenshot) {
        clip.screenshot = meta.screenshot;
        updated++;
        save();
        render();
      }
    } catch {}
  }
  if (updated > 0) toast(updated + ' screenshot' + (updated > 1 ? 's' : '') + ' loaded');
}

// Full-page passcode screen (shown only when the backend requires sign-in
// and we don't yet have a valid stored passcode). Nothing else renders.
function renderLogin(msg) {
  const root = document.getElementById('root');
  root.innerHTML = `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div style="width:100%;max-width:380px;text-align:center;">
      <div style="display:flex;justify-content:center;margin-bottom:26px;"><img src="${MVR_LOGO}" alt="MVR Public Relations" style="height:42px;width:auto;"></div>
      <h1 style="font-family:var(--font-display);font-size:1.9rem;font-weight:700;letter-spacing:-.02em;margin-bottom:8px;color:var(--ink);">Sign in</h1>
      <p style="font-size:.84rem;color:var(--ink-3);line-height:1.5;margin-bottom:22px;">Enter your team passcode to continue.</p>
      <input id="login-code" type="password" class="input" placeholder="Passcode" style="text-align:center;" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="off">
      <div id="login-msg" style="font-size:.76rem;color:var(--red);min-height:18px;margin-top:10px;">${msg ? esc(msg) : ''}</div>
      <button onclick="doLogin()" class="btn btn-primary btn-lg" style="width:100%;margin-top:4px;">Continue</button>
      <p style="font-size:.68rem;color:var(--ink-3);margin-top:24px;letter-spacing:0.02em;">MVR Public Relations · private workspace</p>
    </div>
  </div>`;
  setTimeout(() => document.getElementById('login-code')?.focus(), 50);
}

async function doLogin() {
  const code = document.getElementById('login-code')?.value?.trim();
  const msg = document.getElementById('login-msg');
  if (!code) { if (msg) msg.textContent = 'Enter your passcode.'; return; }
  try {
    const r = await fetch(`${backendBase()}/api/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code }) });
    const j = await r.json().catch(() => ({}));
    if (r.ok && j.ok) { setAuth(code, j.role); await cloudPull(); bootFinish(); }
    else if (msg) msg.textContent = j.error || 'Wrong code. Try again.';
  } catch { if (msg) msg.textContent = 'Could not reach the server. Check your connection.'; }
}

function bootFinish() {
  // Seed the demo only for the owner (or local browser-only mode) when empty —
  // never auto-seed on a staff device or over a real cloud library.
  if (books.length === 0 && role === 'owner') loadDemo();
  render();
  setTimeout(() => { autoMonitorAll(); }, 2000);
  if (!window._clipMonTimer) window._clipMonTimer = setInterval(() => { autoMonitorAll(); }, 30 * 60 * 1000);
}

(function boot() {
  const base = backendBase();
  if (!base) { bootFinish(); return; }   // browser-only mode: no login
  render();                              // paint local immediately
  (async () => {
    let authRequired = false;
    try { const h = await (await fetch(`${base}/api/health`)).json(); authRequired = !!h.authRequired; } catch {}
    if (authRequired) {
      let ok = false;
      if (auth.code) {
        try {
          const r = await fetch(`${base}/api/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: auth.code }) });
          if (r.ok) { const j = await r.json(); if (j.ok) { setAuth(auth.code, j.role); ok = true; } }
        } catch {}
      }
      if (!ok) { renderLogin(); return; } // gate: stop until they sign in
    }
    cloudPull().finally(bootFinish);     // adopt cloud if newer, then finish
  })();
})();
