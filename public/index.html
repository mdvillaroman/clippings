<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MVR PR — Media Workspace</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='15' y='20' width='55' height='68' rx='6' fill='%23EAEAEA' stroke='%23111111' stroke-width='3'/><rect x='30' y='12' width='55' height='68' rx='6' fill='%23F7F6F3' stroke='%23111111' stroke-width='3'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   EDITORIAL DESIGN SYSTEM
   warm paper · rules over cards · restraint as a discipline
   ═══════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Surfaces — warm paper */
  --paper:     #faf9f7;
  --paper-2:   #f3f0eb;
  --surface:   #ffffff;
  --bg:        #faf9f7;
  /* Text — off-black, warm grays */
  --ink:       #1a1815;
  --ink-2:     #6b6560;
  --ink-3:     #a8a29e;
  --text:      #1a1815;
  --text-2:    #6b6560;
  --text-3:    #a8a29e;
  /* Rules + soft tints */
  --rule:      #e8e5e1;
  --rule-soft: #efece7;
  --border:    #e8e5e1;
  /* Accent (defaults — books override) */
  --accent:        #2d5f3d;
  --accent-soft:   #eef2ed;
  --accent-strong: #1e4029;
  /* Semantic muted pastels */
  --green: #346538; --green-bg: #edf3ec;
  --amber: #956400; --amber-bg: #fbf3db;
  --red:   #db423d; --red-bg:   #fbe8e7;
  /* Form */
  --radius:    6px;
  --radius-lg: 10px;
  --radius-xl: 14px;
  /* Shadows — ultra-diffuse only */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.025);
  --shadow:    0 2px 12px rgba(26,24,21,0.04);
  --shadow-lg: 0 8px 32px rgba(26,24,21,0.06);
  /* Type stacks */
  /* Brand: MVR uses Avenir (Black for display, Medium for body). True Avenir
     renders on Apple devices; Mulish is the closest free cross-platform fallback. */
  --font:           'Avenir Next', 'Avenir', 'Mulish', -apple-system, 'Segoe UI', system-ui, sans-serif;
  --font-display:   'Avenir Next', 'Avenir', 'Mulish', -apple-system, system-ui, sans-serif;
  --font-editorial: 'Avenir Next', 'Avenir', 'Mulish', -apple-system, system-ui, sans-serif;
  --font-mono:      'Avenir Next', 'Avenir', 'Mulish', -apple-system, system-ui, sans-serif;
  /* Motion */
  --ease:        cubic-bezier(0.16, 1, 0.3, 1);
  --t-fast:      150ms;
  --t:           250ms;
  --t-slow:      600ms;
}
html { font-size: 15px; }
body {
  font-family: var(--font); background: var(--bg); color: var(--ink);
  line-height: 1.55; -webkit-font-smoothing: antialiased; font-weight: 400;
  font-feature-settings: 'kern' 1, 'liga' 1, 'calt' 1;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
a { color: var(--ink); text-decoration: none; }
img { display: block; max-width: 100%; }
::selection { background: rgba(26,24,21,0.12); color: var(--ink); }

/* ─── Layout primitives ─────────────────────────────────────────── */
.wrap { max-width: 1120px; margin: 0 auto; padding: 0 32px; }
.wrap-tight { max-width: 880px; margin: 0 auto; padding: 0 32px; }
.flex { display: flex; align-items: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-6 { gap: 24px; }

/* ─── Type utilities ────────────────────────────────────────────── */
.eyebrow {
  font-family: var(--font); font-size: 0.66rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-3);
}
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.serif { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.01em; }
.t-xs { font-size: .7rem; } .t-sm { font-size: .8rem; } .t-base { font-size: .92rem; }
.t-lg { font-size: 1.1rem; } .t-xl { font-size: 1.35rem; } .t-2xl { font-size: 1.85rem; } .t-3xl { font-size: 2.6rem; }
.fw-500 { font-weight: 500; } .fw-600 { font-weight: 600; } .fw-700 { font-weight: 700; }
.uppercase { text-transform: uppercase; letter-spacing: .14em; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.c-ink { color: var(--ink); } .c-2 { color: var(--ink-2); } .c-3 { color: var(--ink-3); }

/* ─── Buttons ───────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 18px; font-size: .78rem; font-weight: 600;
  border-radius: var(--radius); letter-spacing: 0.005em;
  transition: background var(--t) var(--ease), color var(--t) var(--ease),
              border-color var(--t) var(--ease), transform var(--t-fast) var(--ease);
  min-height: 34px; white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary, .btn-dark {
  background: var(--ink); color: #fff;
}
.btn-primary:hover, .btn-dark:hover { background: #2a2622; }
.btn-ghost {
  background: transparent; color: var(--ink-2);
  border: 1px solid var(--rule);
}
.btn-ghost:hover { background: var(--paper); border-color: #d4d0ca; color: var(--ink); }
.btn-accent {
  background: var(--accent); color: #fff;
}
.btn-accent:hover { filter: brightness(0.92); }
.btn-sm { padding: 6px 13px; font-size: .72rem; min-height: 30px; }
.btn-lg { padding: 12px 26px; font-size: .85rem; min-height: 42px; }

/* ─── Inputs ────────────────────────────────────────────────────── */
.input {
  width: 100%; padding: 10px 14px; font-size: .85rem;
  border: 1px solid var(--rule); border-radius: var(--radius);
  outline: none; background: var(--surface); color: var(--ink);
  transition: border-color var(--t) var(--ease), box-shadow var(--t) var(--ease), background var(--t) var(--ease);
}
.input:focus {
  border-color: var(--ink); background: var(--surface);
  box-shadow: 0 0 0 3px rgba(26,24,21,0.06);
}
.input::placeholder { color: var(--ink-3); }
.field-label {
  font-size: .66rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--ink-3); display: block; margin-bottom: 7px;
}

/* ─── Badges ────────────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; font-size: .68rem; font-weight: 600;
  border-radius: 100px; letter-spacing: 0.01em; line-height: 1.3;
}
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-red   { background: var(--red-bg);   color: var(--red); }
.badge-gray  { background: var(--paper-2);  color: var(--ink-2); }
.badge-outline {
  background: transparent; border: 1px solid var(--rule); color: var(--ink-2);
}

/* ─── Outlet pill / chip ───────────────────────────────────────── */
.chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 11px 5px 7px; border-radius: 100px;
  background: var(--surface); border: 1px solid var(--rule);
  font-size: .72rem; font-weight: 500; color: var(--ink-2);
  transition: border-color var(--t) var(--ease), background var(--t) var(--ease);
}
.chip:hover { border-color: #d4d0ca; background: #fff; color: var(--ink); }
.chip img { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

/* ─── DA badge ─────────────────────────────────────────────────── */
.da-pill {
  display: inline-flex; align-items: baseline; gap: 4px;
  padding: 3px 9px; border-radius: 100px;
  font-family: var(--font-mono); font-size: .68rem; font-weight: 700;
  letter-spacing: 0.02em; line-height: 1.4;
}
.da-pill .da-prefix { font-size: .58rem; font-weight: 600; opacity: .7; letter-spacing: 0.08em; }
.da-high { background: var(--green-bg); color: var(--green); }
.da-med  { background: var(--amber-bg); color: var(--amber); }
.da-low  { background: var(--paper-2);  color: var(--ink-2); }

/* ─── Cards (used sparingly) ───────────────────────────────────── */
.card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  transition: border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
}
.card:hover { border-color: #d4d0ca; }

/* ─── Modal / overlay ──────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(26,24,21,0.32);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity var(--t) var(--ease);
}
.overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface); border-radius: var(--radius-xl);
  border: 1px solid var(--rule); box-shadow: var(--shadow-lg);
  width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
  animation: modalIn 280ms var(--ease) both;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(8px) scale(.98); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}

/* ─── Tabs (minimal underline) ─────────────────────────────────── */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--rule); }
.tab {
  padding: 14px 0; margin-right: 28px; font-size: .8rem; font-weight: 500;
  color: var(--ink-3); border-bottom: 1.5px solid transparent;
  margin-bottom: -1px; transition: color var(--t) var(--ease), border-color var(--t) var(--ease);
  letter-spacing: 0.005em;
}
.tab:hover { color: var(--ink-2); }
.tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }

/* ─── Toast ────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--ink); color: #fff; padding: 11px 22px; border-radius: 100px;
  font-size: .78rem; font-weight: 500; z-index: 200;
  transition: transform var(--t) var(--ease), opacity var(--t) var(--ease); box-shadow: var(--shadow);
  letter-spacing: 0.005em;
  opacity: 0; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ─── Page enter & scroll-entry animations ─────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
#root > * { animation: fadeUp var(--t-slow) var(--ease) both; }
.stagger > * { opacity: 0; animation: fadeUp var(--t-slow) var(--ease) both; }
.stagger > *:nth-child(1) { animation-delay: 0ms; }
.stagger > *:nth-child(2) { animation-delay: 70ms; }
.stagger > *:nth-child(3) { animation-delay: 140ms; }
.stagger > *:nth-child(4) { animation-delay: 210ms; }
.stagger > *:nth-child(5) { animation-delay: 280ms; }
.stagger > *:nth-child(6) { animation-delay: 340ms; }
.stagger > *:nth-child(7) { animation-delay: 400ms; }
.stagger > *:nth-child(8) { animation-delay: 460ms; }
.scroll-entry {
  opacity: 0; transform: translateY(10px);
  transition: opacity var(--t-slow) var(--ease), transform var(--t-slow) var(--ease);
}
.scroll-entry.in-view { opacity: 1; transform: translateY(0); }

/* ─── Focus & accessibility ────────────────────────────────────── */
:focus-visible {
  outline: 2px solid var(--ink); outline-offset: 2px; border-radius: 4px;
}

/* ─── Nav bar (sticky, glassy paper) ───────────────────────────── */
.glass-nav {
  position: sticky; top: 0; z-index: 10;
  background: rgba(250,249,247,0.85);
  backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2);
  border-bottom: 1px solid var(--rule);
}

/* ─── Screenshot frame ─────────────────────────────────────────── */
.ss-frame {
  background: linear-gradient(135deg, #f5f3f0 0%, #ebe8e4 100%);
  overflow: hidden; position: relative;
}
.ss-frame img {
  width: 100%; height: 100%; object-fit: cover; object-position: top center;
  transition: transform 700ms var(--ease);
}

/* Clip hover actions */
.clip-actions { opacity: 0; transition: opacity var(--t) var(--ease); }
.clip-row:hover .clip-actions, .clip-card:hover .clip-actions { opacity: 1; }

/* Wordmark */
.wordmark {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-display); font-size: 1.05rem; font-weight: 700;
  letter-spacing: -0.01em; color: var(--ink);
}
.wordmark-dot {
  width: 7px; height: 7px; border-radius: 7px; background: var(--ink);
  display: inline-block;
}

/* ═══════════════════════════════════════════════════════════════════
   REPORT — editorial monograph
   ═══════════════════════════════════════════════════════════════════ */
.report {
  --r-paper:    #faf9f7;
  --r-surface:  #ffffff;
  --r-ink:      #1a1815;
  --r-ink-2:    #6b6560;
  --r-ink-3:    #a8a29e;
  --r-rule:     #e8e5e1;
  --r-rule-soft:#efece7;
  --r-accent:   var(--accent);
  font-family: var(--font);
  color: var(--r-ink);
  background: var(--r-paper);
  font-feature-settings: 'kern' 1, 'liga' 1, 'calt' 1;
}

/* Section label rule */
.r-section-label {
  display: flex; align-items: center; gap: 14px;
  font-size: .66rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.16em; color: var(--r-ink-3);
  margin-bottom: 32px;
}
.r-section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--r-rule);
}

/* Divider / chapter opener pages */
.r-divider {
  min-height: 90vh; display: flex; flex-direction: column;
  justify-content: center; align-items: center; text-align: center;
  padding: 80px 64px; position: relative;
}
.r-divider .r-chapter-num {
  font-family: var(--font-mono); font-size: .7rem; font-weight: 500;
  letter-spacing: 0.2em; color: var(--r-ink-3); margin-bottom: 28px;
  text-transform: uppercase;
}
.r-divider h2 {
  font-family: var(--font-display); font-weight: 800;
  font-size: 4.2rem; letter-spacing: -0.035em; line-height: 1;
  color: var(--r-ink); margin-bottom: 28px;
}
.r-divider .r-rule {
  width: 44px; height: 2px; border-radius: 2px;
  background: var(--r-accent); margin-bottom: 24px;
}
.r-divider p {
  font-family: var(--font-editorial); font-size: 1rem;
  color: var(--r-ink-2); max-width: 36ch; line-height: 1.55;
  font-style: italic; font-weight: 400;
}

/* Stat rows — rules, not cards */
.r-stat-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 18px 0; border-top: 1px solid var(--r-rule); gap: 24px;
}
.r-stat-row:last-child { border-bottom: 1px solid var(--r-rule); }
.r-stat-row .r-label {
  font-size: .82rem; font-weight: 500; color: var(--r-ink-2);
}
.r-stat-row .r-val {
  font-family: var(--font-mono); font-size: 1.15rem; font-weight: 600;
  color: var(--r-ink); font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}

/* Hero stat blocks (large numerical) */
.r-hero-stat {
  padding: 28px 0 24px;
  border-top: 1px solid var(--r-rule);
}
.r-hero-stat.is-primary { border-top: 2px solid var(--r-accent); }
.r-hero-stat .r-hero-val {
  font-family: var(--font-mono); font-size: 2.8rem; font-weight: 600;
  line-height: 1; color: var(--r-ink); font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}
.r-hero-stat .r-hero-label {
  font-size: .66rem; font-weight: 600; color: var(--r-ink-3);
  text-transform: uppercase; letter-spacing: 0.14em; margin-top: 14px;
}
.r-hero-stat .r-hero-desc {
  font-size: .78rem; color: var(--r-ink-2);
  margin-top: 8px; line-height: 1.5; max-width: 32ch;
}

/* Secondary stat blocks (small) */
.r-mini-stat {
  padding: 18px 0 14px; border-top: 1px solid var(--r-rule);
}
.r-mini-stat .r-mini-icon {
  width: 18px; height: 18px; color: var(--r-ink-3); margin-bottom: 14px;
  stroke-width: 1.4;
}
.r-mini-stat .r-mini-val {
  font-family: var(--font-mono); font-size: 1.45rem; font-weight: 600;
  line-height: 1; color: var(--r-ink); font-variant-numeric: tabular-nums;
}
.r-mini-stat .r-mini-label {
  font-size: .62rem; font-weight: 600; color: var(--r-ink-3);
  text-transform: uppercase; letter-spacing: 0.12em; margin-top: 8px;
}
.r-mini-stat .r-mini-desc {
  font-size: .7rem; color: var(--r-ink-2); margin-top: 6px; line-height: 1.45;
}

/* Featured-In outlet pill */
.r-outlet-pill {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 8px 16px 8px 10px; border-radius: 100px;
  background: var(--r-surface); border: 1px solid var(--r-rule);
  font-size: .78rem; font-weight: 500; color: var(--r-ink);
  letter-spacing: 0.005em;
}
.r-outlet-pill img { width: 16px; height: 16px; border-radius: 3px; }

/* Clip page (one per page, two-column) */
.r-clip-page {
  min-height: 92vh; padding: 64px 56px 48px;
  display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 56px;
  align-content: start; position: relative;
}

/* Outlet header */
.r-outlet-header {
  display: flex; gap: 16px; align-items: center;
  padding-bottom: 20px; margin-bottom: 22px;
  border-bottom: 1px solid var(--r-rule);
}
.r-outlet-logo {
  width: 52px; height: 52px; border-radius: 50%; overflow: hidden;
  background: var(--paper-2); border: 1px solid var(--r-rule);
  flex-shrink: 0; display: grid; place-items: center;
  font-family: var(--font-display); font-size: 1.6rem; color: var(--r-ink-2);
}
.r-outlet-logo img { width: 100%; height: 100%; object-fit: cover; }
.r-outlet-name {
  font-size: 1.05rem; font-weight: 600; line-height: 1.2;
  color: var(--r-ink); letter-spacing: -0.005em;
}
.r-outlet-meta {
  display: flex; gap: 14px; align-items: center;
  margin-top: 6px; font-size: .74rem; color: var(--r-ink-3);
}
.r-outlet-meta-dot {
  width: 2px; height: 2px; border-radius: 2px; background: var(--r-ink-3);
}

/* Screenshot */
.r-clip-shot {
  border-radius: 8px; overflow: hidden;
  border: 1px solid rgba(26,24,21,0.06);
  box-shadow: 0 2px 20px rgba(26,24,21,0.04);
  background: linear-gradient(135deg, #f5f3f0, #ebe8e4);
}
.r-clip-shot img { width: 100%; display: block; object-fit: cover; object-position: top; }

/* Right column meta */
.r-clip-meta-top {
  display: flex; align-items: center; gap: 12px;
  font-size: .76rem; color: var(--r-ink-2); margin-bottom: 22px;
}
.r-clip-meta-top .r-date { font-weight: 600; color: var(--r-ink); }
.r-clip-type {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 11px; border-radius: 100px;
  border: 1px solid var(--r-rule); font-size: .66rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--r-ink-2);
}
.r-clip-headline {
  font-family: var(--font-display); font-weight: 700;
  font-size: 2rem; line-height: 1.15; letter-spacing: -0.03em;
  color: var(--r-ink); margin-bottom: 20px;
}
.r-clip-url {
  font-family: var(--font-mono); font-size: .68rem; color: var(--r-ink-3);
  word-break: break-all; line-height: 1.5; padding-bottom: 24px;
  border-bottom: 1px solid var(--r-rule); margin-bottom: 24px;
}
.r-clip-url a { color: inherit; }
.r-clip-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px;
}
.r-clip-stats > div {
  border-top: 1px solid var(--r-rule); padding-top: 14px;
}
.r-clip-stat-val {
  font-family: var(--font-mono); font-size: 1.15rem; font-weight: 600;
  line-height: 1; color: var(--r-ink); font-variant-numeric: tabular-nums;
}
.r-clip-stat-label {
  font-size: .62rem; font-weight: 600; color: var(--r-ink-3);
  text-transform: uppercase; letter-spacing: 0.12em; margin-top: 6px;
}
.r-clip-notes {
  margin-top: 28px; padding: 18px 20px;
  background: var(--paper-2); border-radius: 8px;
}
.r-clip-notes-label {
  font-size: .62rem; font-weight: 600; color: var(--r-ink-3);
  text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 7px;
}
.r-clip-notes p {
  font-family: var(--font-editorial); font-size: .92rem;
  color: var(--r-ink); line-height: 1.55; font-weight: 400;
}

/* Page footer */
.r-page-footer {
  grid-column: 1 / -1;
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 24px; margin-top: 36px;
  border-top: 1px solid var(--r-rule);
  font-size: .66rem; color: var(--r-ink-3);
  text-transform: uppercase; letter-spacing: 0.14em;
}
.r-page-footer .r-page-num {
  font-family: var(--font-mono); letter-spacing: 0.1em;
}

/* Final report footer */
.r-final-footer {
  padding: 40px 56px 56px;
  display: flex; justify-content: space-between; align-items: baseline;
  border-top: 1px solid var(--r-rule);
  font-size: .68rem; color: var(--r-ink-3); letter-spacing: 0.04em;
}

/* ═══════════════════════════════════════════════════════════════════
   PRINT / PDF
   ═══════════════════════════════════════════════════════════════════ */
@media print {
  .no-print { display: none !important; }
  body { background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .report { max-width: none !important; box-shadow: none !important; }
  .r-cover { page-break-after: always; min-height: 100vh; }
  .r-divider { page-break-before: always; page-break-after: always; min-height: 100vh; }
  .r-summary { page-break-after: always; }
  .r-clip-page { page-break-before: always; break-inside: avoid; page-break-inside: avoid; min-height: auto; padding: 48px 40px; }
  .r-final-footer { page-break-before: always; }
  .card, .r-clip-shot { box-shadow: none !important; }
  a { color: var(--r-ink) !important; }
  .r-clip-shot img { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @page { margin: 1cm 1.2cm; size: A4; }
}

/* ═══════════════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════════════ */
@media (max-width: 900px) {
  .wrap, .wrap-tight { padding: 0 20px; }
  .hide-mobile { display: none !important; }
  .r-clip-page { grid-template-columns: 1fr; gap: 32px; padding: 40px 28px; }
  .r-cover { grid-template-columns: 1fr !important; min-height: auto !important; }
  .r-cover > div:first-child { padding: 36px 28px 28px !important; }
  .r-cover > div:last-child { min-height: 360px; padding: 36px 28px !important; }
}
/* Phones: stack page headers so the description doesn't get crushed beside the
   action buttons (Newsroom / Media List / Pitches / Tasks all share this head). */
@media (max-width: 600px) {
  header.wrap > .flex-between { flex-direction: column; align-items: flex-start !important; gap: 18px; }
  header.wrap > .flex-between > .flex { width: 100%; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .stagger > * { animation: none; opacity: 1; }
  #root > * { animation: none; }
}
</style>

let _lastCloudPush = 0;

// Normalized backend base URL (no trailing slash), or '' if not set.
// When the app is served from a real host (i.e. deployed — the backend
// serves it from the same origin), auto-use that origin so there's no
// Settings step. Localhost/preview stays browser-only unless set manually.
function backendBase() {
  let u = (settings.backendUrl || '').trim();
  if (!u) {
    if (/^https?:$/.test(location.protocol) && !/^(localhost|127\.0\.0\.1)$/.test(location.hostname)) {
      return location.origin;
    }
    return '';
  }
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
  return u.replace(/\/+$/, '');
}
let nav = { view: 'home', bookId: null, tab: 'clips' };

function load() {
  try {
    // Try new key first, then fall back to old key for seamless migration
    const raw = localStorage.getItem(DB) || localStorage.getItem('coveragekit_v2');
    if (raw) {
      const d = JSON.parse(raw);
      books = d.books || [];
      if (d.settings) settings = { ...settings, ...d.settings };
      _localUpdatedAt = +d.updatedAt || 0;
      // Persist under new key if migrated from old
      if (!localStorage.getItem(DB) && raw) save();
    }
  } catch(e) {}
  // Migrate v1 data
  try {
    const v1 = localStorage.getItem('coveragekit_v1') || localStorage.getItem('coveragekit_v2');
    if (v1 && !localStorage.getItem(DB)) {
      const d = JSON.parse(v1);
      if (d.books) {
        books = d.books.map(b => ({
          ...b,
          clips: (b.clips || []).map(c => ({
            ...c,
            domainAuthority: c.domainAuthority || 0,
            pageRank: c.pageRank || 0,
            estimatedViews: c.estimatedViews || 0,
            socialShares: c.socialShares || (+c.reach > 0 ? 0 : 0),
            outletLogo: '',
            type: 'online',
          })),
          monitors: b.monitors || [],
          pending: b.pending || [],
          accentColor: b.accentColor || '#2d5f3d',
          clientLogo: b.clientLogo || '',
        }));
        save();
      }
    }
  } catch(e) {}
}

let _localUpdatedAt = 0;
function save() {
  _localUpdatedAt = Date.now();
  localStorage.setItem(DB, JSON.stringify({ books, settings, updatedAt: _localUpdatedAt }));
  if (backendBase()) cloudPush();
}

// ── Cloud backup & sync (optional, via the backend) ─────────────────
let _cloudTimer = null;
function cloudPush() {
  clearTimeout(_cloudTimer);
  _cloudTimer = setTimeout(async () => {
    const base = backendBase();
    if (!base) return;
    try {
      await fetch(`${base}/api/library`, {
        method: 'POST',
        headers: apiHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ books, settings, updatedAt: _localUpdatedAt }),
      });
    } catch {}
  }, 1500);
}

// Pull on boot: adopt the cloud copy only if it's newer than local.
async function cloudPull() {
  const base = backendBase();
  if (!base) return;
  try {
    const r = await fetch(`${base}/api/library`, { headers: apiHeaders() });
    const j = await r.json();
    if (j && Array.isArray(j.books) && (+j.updatedAt || 0) > _localUpdatedAt) {
      books = j.books;
      if (j.settings) settings = { ...settings, ...j.settings };
      _localUpdatedAt = +j.updatedAt || Date.now();
      localStorage.setItem(DB, JSON.stringify({ books, settings, updatedAt: _localUpdatedAt }));
      render();
      toast('Synced latest from your backup');
    }
  } catch {}
}

// Manual: force a backup now.
async function backupNow() {
  const base = backendBase();
  if (!base) { toast('Connect your backend in Settings first'); return; }
  _localUpdatedAt = Date.now();
  try {
    const r = await fetch(`${base}/api/library`, {
      method: 'POST',
      headers: apiHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ books, settings, updatedAt: _localUpdatedAt }),
    });
    const j = await r.json();
    if (j.ok) { settings.lastBackupAt = _localUpdatedAt; localStorage.setItem(DB, JSON.stringify({ books, settings, updatedAt: _localUpdatedAt })); toast('Backed up ' + books.length + ' book' + (books.length!==1?'s':'')); }
    else toast(j.error || 'Backup failed — check your token');
  } catch { toast('Could not reach the backend.'); }
}

// Manual: restore from cloud, replacing local (with confirmation).
function restoreFromCloud() {
  const base = backendBase();
  if (!base) { toast('Connect your backend in Settings first'); return; }
  confirmAction('Restore from cloud?', 'This replaces what’s on this device with your latest backup.', async () => {
    try {
      const r = await fetch(`${base}/api/library`, { headers: apiHeaders() });
      const j = await r.json();
      if (j && Array.isArray(j.books)) {
        books = j.books;
        if (j.settings) settings = { ...settings, ...j.settings };
        _localUpdatedAt = +j.updatedAt || Date.now();
        localStorage.setItem(DB, JSON.stringify({ books, settings, updatedAt: _localUpdatedAt }));
        go('home');
        toast('Restored ' + books.length + ' book' + (books.length!==1?'s':'') + ' from cloud');
      } else toast('No backup found');
    } catch { toast('Could not reach the backend.'); }
  });
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

// APIS
// ═══════════════════════════════════════════════════════════════════
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];
async function proxyFetch(url) {
  for (const mkUrl of PROXIES) {
    try {
      const r = await fetch(mkUrl(url), { signal: AbortSignal.timeout(8000) });
      if (r.ok) return r;
    } catch {}
  }
  throw new Error('All proxies failed');
}
const PROXY = 'https://api.allorigins.win/raw?url=';

function extractDomain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; }
}

function outletLogoUrl(domain) {
  return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
}

// Extract a YouTube video ID from any common URL shape.
function youtubeId(url) {
  if (!url) return '';
  try {
    const u = new URL(url);
    const host = u.hostname.replace(/^www\./, '');
    if (host === 'youtu.be') return u.pathname.slice(1).split('/')[0];
    if (host.endsWith('youtube.com')) {
      if (u.searchParams.get('v')) return u.searchParams.get('v');
      const m = u.pathname.match(/\/(?:embed|shorts|live)\/([^/?]+)/);
      if (m) return m[1];
    }
  } catch {}
  return '';
}

// High-quality video thumbnails, maxres first then hq fallback.
function youtubeThumbs(url) {
  const id = youtubeId(url);
  if (!id) return [];
  return [
    `https://i.ytimg.com/vi/${id}/maxresdefault.jpg`,
    `https://i.ytimg.com/vi/${id}/hqdefault.jpg`,
  ];
}

// Screenshot sources, tried in order via onerror cascade.
// 1. Existing (user-uploaded or microlink-fetched)
// 2. Real YouTube thumbnail for video URLs
// 3. WordPress mshots — broad but slow first hit
// 4. thum.io — fast, no API key
// 5. mshots fallback at higher width
function screenshotSources(url, existing) {
  if (!url) return existing ? [existing] : [];
  const enc = encodeURIComponent(url);
  const out = [];
  if (existing) out.push(existing);
  out.push(...youtubeThumbs(url));
  out.push(`https://s0.wp.com/mshots/v1/${enc}?w=1280&h=860`);
  out.push(`https://image.thum.io/get/width/1200/crop/900/${url}`);
  out.push(`https://s.wordpress.com/mshots/v1/${enc}?w=1280`);
  return out;
}

function screenshotUrl(url, existing) {
  const sources = screenshotSources(url, existing);
  return sources[0] || null;
}

// Returns a complete <img> tag with multi-source fallback chain.
// Walks through screenshotSources via __shotNext on each error,
// finally showing a paper-gradient placeholder.
function screenshotImg(c, opts) {
  opts = opts || {};
  const sources = screenshotSources(c.url, c.screenshot);
  const json = encodeURIComponent(JSON.stringify(sources));
  const style = opts.style || 'width:100%;height:100%;object-fit:cover;object-position:top;display:block;';
  const cls = opts.className || '';
  if (sources.length === 0) {
    return `<div class="${cls}" style="display:grid;place-items:center;height:100%;color:var(--ink-3);font-size:.74rem;letter-spacing:0.04em;text-transform:uppercase;">No preview</div>`;
  }
  return `<img src="${sources[0]}" class="${cls}" data-shots="${json}" data-shot="0" loading="lazy" alt="${esc(c.title || '')}" style="${style}" onload="this.dataset.loaded='1'" onerror="__shotNext(this)">`;
}

// Walk the screenshot fallback chain. Called from img onerror.
window.__shotNext = function(img) {
  try {
    const sources = JSON.parse(decodeURIComponent(img.dataset.shots || '%5B%5D'));
    const next = (+img.dataset.shot || 0) + 1;
    if (next < sources.length) {
      img.dataset.shot = next;
      img.src = sources[next];
    } else {
      // All failed — replace with a placeholder
      img.outerHTML = `<div style="display:grid;place-items:center;width:100%;height:100%;color:var(--ink-3);font-size:.7rem;letter-spacing:0.06em;text-transform:uppercase;background:linear-gradient(135deg,#f5f3f0,#ebe8e4);">Preview unavailable</div>`;
    }
  } catch(e) {}
};

// Read image file → data URL, optionally resized.
// maxW caps width to keep localStorage small. Returns Promise<string>.
function readImageFile(file, maxW = 320) {
  return new Promise((resolve, reject) => {
    if (!file) return reject(new Error('No file'));
    const fr = new FileReader();
    fr.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL(file.type === 'image/png' ? 'image/png' : 'image/jpeg', 0.88));
      };
      img.onerror = () => reject(new Error('Bad image'));
      img.src = e.target.result;
    };
    fr.onerror = () => reject(new Error('Read failed'));
    fr.readAsDataURL(file);
  });
}

// Handle a logo upload — preview into target el, save dataURL into hidden input.
async function handleLogoUpload(input, hiddenId, previewId) {
  const file = input.files && input.files[0];
  if (!file) return;
  try {
    const dataUrl = await readImageFile(file, 320);
    const hidden = document.getElementById(hiddenId);
    if (hidden) hidden.value = dataUrl;
    const preview = document.getElementById(previewId);
    if (preview) {
      preview.innerHTML = `<img src="${dataUrl}" alt="" style="width:100%;height:100%;object-fit:contain;padding:6px;">`;
      preview.style.borderStyle = 'solid';
      preview.style.background = '#fff';
    }
  } catch(e) {
    alert('Could not read that image.');
  }
}

// Same but for screenshots (larger maxW)
async function handleScreenshotUpload(input, hiddenId, previewId) {
  const file = input.files && input.files[0];
  if (!file) return;
  try {
    const dataUrl = await readImageFile(file, 1200);
    const hidden = document.getElementById(hiddenId);
    if (hidden) hidden.value = dataUrl;
    const preview = document.getElementById(previewId);
    if (preview) {
      preview.style.display = 'block';
      const img = preview.querySelector('img');
      if (img) img.src = dataUrl;
    }
  } catch(e) {
    alert('Could not read that image.');
  }
}

// ─── Brand auto-fetch ────────────────────────────────────────────
// Given a website URL, try to retrieve a high-quality logo and
// extract a brand-appropriate accent color from the logo.

async function loadImageCors(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

// Load without CORS — just verifies the image exists. Cannot be drawn to canvas.
async function loadImageNoCors(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function urlToDataUrl(url, maxW = 320) {
  const img = await loadImageCors(url);
  const scale = Math.min(1, maxW / Math.max(img.width, 1));
  const w = Math.max(1, Math.round(img.width * scale));
  const h = Math.max(1, Math.round(img.height * scale));
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, 0, 0, w, h);
  return c.toDataURL('image/png');
}

// Sample pixels of a logo, return its dominant brand-y color as hex.
// Filters out neutrals (near-white, near-black, low-saturation grays).
async function extractDominantColor(srcOrImg) {
  const img = typeof srcOrImg === 'string' ? await loadImageCors(srcOrImg) : srcOrImg;
  const size = 48;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  let data;
  try { data = ctx.getImageData(0, 0, size, size).data; }
  catch { return null; } // tainted canvas
  const buckets = {};
  for (let i = 0; i < data.length; i += 4) {
    const a = data[i+3];
    if (a < 200) continue;
    const r = data[i], g = data[i+1], b = data[i+2];
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    if (max < 40) continue;          // near-black
    if (min > 220) continue;         // near-white
    if (max - min < 22) continue;    // gray
    // Quantize to 4 bits per channel
    const k = `${r>>4}|${g>>4}|${b>>4}`;
    buckets[k] = (buckets[k] || 0) + 1;
  }
  const sorted = Object.entries(buckets).sort((a,b) => b[1] - a[1]);
  if (sorted.length === 0) return null;
  const [r4, g4, b4] = sorted[0][0].split('|').map(Number);
  // Expand 4-bit → 8-bit
  const rr = (r4 << 4) | r4, gg = (g4 << 4) | g4, bb = (b4 << 4) | b4;
  return '#' + [rr,gg,bb].map(n => n.toString(16).padStart(2,'0')).join('');
}

// Try multiple logo sources for a given URL.
// Returns the first that loads, plus a dominant color if CORS permits.
async function fetchBrandFromUrl(input) {
  if (!input) return null;
  let url = input.trim();
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  let domain;
  try { domain = new URL(url).hostname.replace(/^www\./, ''); }
  catch { domain = url.replace(/^.*?\/\//, '').split('/')[0]; }
  if (!domain) return null;

  const sources = [
    `https://logo.clearbit.com/${domain}?size=400`,
    `https://icon.horse/icon/${domain}/256`,
    `https://logo.uplead.com/${domain}`,
    `https://www.google.com/s2/favicons?domain=${domain}&sz=256`,
    `https://icons.duckduckgo.com/ip3/${domain}.ico`,
  ];

  for (const src of sources) {
    // First try with CORS — gives us both display + canvas access.
    let img = null;
    let cors = false;
    try {
      img = await loadImageCors(src);
      if (img.naturalWidth < 24) { img = null; }
      else cors = true;
    } catch {}
    // Fall back to no-CORS — image is still usable as <img src>, just can't extract color.
    if (!img) {
      try {
        img = await loadImageNoCors(src);
        if (img.naturalWidth < 24) { img = null; }
      } catch {}
    }
    if (!img) continue;

    // Got a usable logo.
    let logoData = src;
    let accent = null;
    if (cors) {
      try { logoData = await urlToDataUrl(src, 320); } catch {}
      try { accent = await extractDominantColor(img); } catch {}
    }
    return { logo: logoData, accent, domain };
  }
  return null;
}

// Wire the result into the open modal — logo into preview + hidden input,
// optional accent into the color swatch group.
async function doFetchBrand(urlId, logoDataId, previewId, colorId, btnId, msgId) {
  const url = document.getElementById(urlId)?.value?.trim();
  const btn = btnId ? document.getElementById(btnId) : null;
  const msg = msgId ? document.getElementById(msgId) : null;
  if (!url) { if (msg) msg.textContent = 'Enter a website first.'; return; }

  const origText = btn ? btn.textContent : '';
  if (btn) { btn.textContent = 'Fetching\u2026'; btn.disabled = true; }
  if (msg) { msg.textContent = 'Searching brand sources\u2026'; msg.style.color = 'var(--ink-3)'; }

  try {
    const brand = await fetchBrandFromUrl(url);
    if (!brand) {
      if (msg) { msg.textContent = 'No logo found for that domain. Upload one below.'; msg.style.color = 'var(--ink-2)'; }
      return;
    }
    // Set logo
    const hidden = document.getElementById(logoDataId);
    if (hidden) hidden.value = brand.logo;
    const preview = document.getElementById(previewId);
    if (preview) {
      preview.innerHTML = `<img src="${brand.logo}" alt="" style="width:100%;height:100%;object-fit:contain;padding:6px;" onerror="this.parentElement.innerHTML='<svg width=&quot;18&quot; height=&quot;18&quot; fill=&quot;none&quot; stroke=&quot;var(--ink-3)&quot; stroke-width=&quot;1.5&quot; viewBox=&quot;0 0 24 24&quot;><rect x=&quot;3&quot; y=&quot;3&quot; width=&quot;18&quot; height=&quot;18&quot; rx=&quot;2&quot;/><circle cx=&quot;9&quot; cy=&quot;9&quot; r=&quot;2&quot;/><path d=&quot;m21 15-5-5L5 21&quot;/></svg>'">`;
      preview.style.borderStyle = 'solid';
      preview.style.background = '#fff';
    }
    // Set accent if found
    let accentBit = '';
    if (brand.accent && colorId) {
      const colorInput = document.getElementById(colorId);
      if (colorInput) {
        colorInput.value = brand.accent;
        // Reset swatches highlight (custom color is not in the preset row)
        const swatchRow = colorInput.parentElement?.querySelector('div');
        if (swatchRow) {
          swatchRow.querySelectorAll('button').forEach(b => {
            b.style.boxShadow = '';
            b.style.transform = 'scale(1)';
            if ((b.style.background || '').toLowerCase().includes(brand.accent.toLowerCase())) {
              b.style.boxShadow = `0 0 0 2px var(--paper),0 0 0 4px ${brand.accent}`;
              b.style.transform = 'scale(1.05)';
            }
          });
        }
        accentBit = ` · accent set to ${brand.accent}`;
      }
    }
    if (msg) { msg.textContent = `Found ${brand.domain}${accentBit}`; msg.style.color = 'var(--ink-2)'; }
  } catch (e) {
    if (msg) { msg.textContent = 'Could not fetch — try a different URL or upload below.'; msg.style.color = 'var(--ink-2)'; }
  } finally {
    if (btn) { btn.textContent = origText || 'Fetch brand'; btn.disabled = false; }
  }
}

async function fetchMicrolink(url) {
  try {
    const r = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}&screenshot=true`);
    const j = await r.json();
    const d = j.data || {};
    return {
      title: d.title || '',
      outlet: d.publisher || extractDomain(url),
      screenshot: d.screenshot?.url || null,
      date: d.date ? d.date.slice(0,10) : '',
      description: d.description || '',
    };
  } catch { return { title: '', outlet: extractDomain(url), screenshot: null, date: '', description: '' }; }
}

async function fetchPageRank(domain) {
  if (!settings.oprKey) return { pageRank: 0, rank: 0 };
  try {
    const apiUrl = `https://openpagerank.com/api/v1.0/getPageRank?domains[]=${encodeURIComponent(domain)}`;
    const r = await fetch(PROXY + encodeURIComponent(apiUrl), {
      headers: { 'API-OPR': settings.oprKey }
    });
    const j = await r.json();
    const item = j?.response?.[0];
    if (item && item.status_code === 200) {
      return {
        pageRank: item.page_rank_decimal || 0,
        rank: item.rank || 0,
      };
    }
  } catch(e) {
    // Try direct call as fallback
    try {
      const r2 = await fetch(`https://openpagerank.com/api/v1.0/getPageRank?domains[]=${encodeURIComponent(domain)}`, {
        headers: { 'API-OPR': settings.oprKey }
      });
      const j2 = await r2.json();
      const item2 = j2?.response?.[0];
      if (item2 && item2.status_code === 200) {
        return { pageRank: item2.page_rank_decimal || 0, rank: item2.rank || 0 };
      }
    } catch {}
  }
  return { pageRank: 0, rank: 0 };
}

// SimilarWeb total visits for a domain (latest available month).
// Requires a paid SimilarWeb API key in settings. Routed through the
// CORS proxy since the API does not allow direct browser calls.
async function fetchSimilarWeb(domain) {
  if (!settings.simKey || !domain) return null;
  const now = new Date();
  const prev = new Date(now.getFullYear(), now.getMonth() - 2, 1);
  const end = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const ym = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  const api = `https://api.similarweb.com/v1/website/${domain}/total-traffic-and-engagement/visits`
    + `?api_key=${encodeURIComponent(settings.simKey)}&start_date=${ym(prev)}&end_date=${ym(end)}`
    + `&country=world&granularity=monthly&main_domain_only=false&format=json`;
  try {
    const r = await proxyFetch(api);
    const j = await r.json();
    const visits = j?.visits;
    if (Array.isArray(visits) && visits.length) {
      const last = visits[visits.length - 1];
      return Math.round(+last.visits || 0);
    }
  } catch {}
  return null;
}

// Refresh a book's metrics from live data sources instead of imported
// spreadsheet values. OpenPageRank gives real Domain Authority + rank
// (free key); SimilarWeb gives measured monthly traffic (paid key). When
// no SimilarWeb key is present, traffic is estimated from PageRank.
async function refreshLiveMetrics(bookId) {
  const b = books.find(x => x.id === bookId);
  if (!b) return;
  const base = backendBase();
  if (!base && !settings.oprKey && !settings.simKey) {
    toast('Add your backend URL (or an API key) in Settings first');
    openSettingsModal();
    return;
  }
  const clips = b.clips || [];
  if (!clips.length) { toast('No clips to refresh'); return; }
  toast('Pulling live metrics…');
  let updated = 0;
  for (const c of clips) {
    const domain = extractDomain(c.url || '');
    if (!domain) continue;

    if (base) {
      // Backend holds the keys and returns DA + traffic together.
      try {
        const r = await fetch(`${base}/api/metrics?domain=${encodeURIComponent(domain)}`, { headers: apiHeaders() });
        const j = await r.json();
        if (j.domainAuthority != null) { c.domainAuthority = j.domainAuthority; c.pageRank = j.pageRank || 0; c.daSource = j.sources?.da || 'OpenPageRank'; updated++; }
        if (j.visits != null) { c.reach = j.visits; c.reachSource = j.sources?.traffic || 'SimilarWeb'; updated++; }
        else if (j.pageRank) { c.reach = estimateViews(j.pageRank, c.socialShares, true); c.estimatedViews = estimateViews(j.pageRank, c.socialShares, false); c.reachSource = 'Estimated (PageRank)'; }
      } catch {}
    } else {
      if (settings.oprKey) {
        const pr = await fetchPageRank(domain);
        if (pr.pageRank > 0) {
          c.domainAuthority = daFromPageRank(pr.pageRank);
          c.pageRank = pr.pageRank;
          c.daSource = 'OpenPageRank';
          if (!settings.simKey) {
            c.reach = estimateViews(pr.pageRank, c.socialShares, true);
            c.estimatedViews = estimateViews(pr.pageRank, c.socialShares, false);
            c.reachSource = 'Estimated (PageRank)';
          }
          updated++;
        }
      }
      if (settings.simKey) {
        const visits = await fetchSimilarWeb(domain);
        if (visits) { c.reach = visits; c.reachSource = 'SimilarWeb'; updated++; }
      }
    }
    c.metricsUpdatedAt = new Date().toISOString();
    save(); render();
  }
  toast(updated ? 'Live metrics updated' : 'No live data returned — check your backend keys/plan');
}

// ── Backend monitoring sync ─────────────────────────────────────────
// Push every book's keyword set to the backend so it can monitor 24/7.
async function syncMonitorsToBackend() {
  const base = backendBase();
  if (!base) return;
  const clients = books
    .filter(b => (b.monitors || []).length)
    .map(b => ({ id: b.id, name: b.client || b.name, keywords: (b.monitors || []).map(m => m.keyword).filter(Boolean) }));
  try {
    await fetch(`${base}/api/monitors/sync`, {
      method: 'POST', headers: apiHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ clients }),
    });
  } catch {}
}

// Pull mentions the backend found and merge them into each book's queue.
async function pullBackendMentions() {
  const base = backendBase();
  if (!base) return 0;
  let added = 0;
  try {
    const r = await fetch(`${base}/api/mentions`, { headers: apiHeaders() });
    const j = await r.json();
    for (const m of (j.mentions || [])) {
      const b = books.find(x => x.id === m.clientId);
      if (!b) continue;
      if (!b.pending) b.pending = [];
      const known = new Set([...(b.clips || []).map(c => c.url), ...b.pending.map(p => p.url)]);
      if (m.url && !known.has(m.url)) {
        b.pending.push({ url: m.url, title: m.title || '', outlet: m.outlet || extractDomain(m.url), outletUrl: m.sourceUrl || '', date: m.date || '', keyword: m.keyword, foundAt: m.foundAt });
        added++;
      }
    }
    let promoted = 0;
    books.forEach(b2 => { promoted += autoPromoteStrong(b2); });
    if (added || promoted) { save(); render(); }
  } catch {}
  return added;
}

// ═══════════════════════════════════════════════════════════════════
// METRICS ENGINE
// ═══════════════════════════════════════════════════════════════════
// PageRank → estimated monthly traffic (conservative estimates)
const PR_TRAFFIC = [100, 800, 4000, 20000, 80000, 400000, 1500000, 8000000, 40000000, 150000000, 800000000];

function estimateMonthlyTraffic(pr) {
  if (pr <= 0) return PR_TRAFFIC[0];
  if (pr >= 10) return PR_TRAFFIC[10];
  const f = Math.floor(pr), c = Math.ceil(pr);
  const frac = pr - f;
  return Math.round(PR_TRAFFIC[f] * (1 - frac) + PR_TRAFFIC[c] * frac);
}

function estimateViews(pr, socialShares = 0, isHomepage = false) {
  const traffic = estimateMonthlyTraffic(pr);
  const placement = isHomepage ? 0.12 : 0.018;
  const social = 1 + (socialShares / 800);
  return Math.round(traffic * placement * social);
}

function daFromPageRank(pr) {
  // Non-linear map: PR 0-10 → DA-like 0-100
  if (pr <= 0) return 1;
  if (pr >= 10) return 100;
  // Most real sites fall in 15-65 DA range
  const curve = [1, 12, 22, 32, 40, 50, 58, 68, 78, 90, 100];
  const f = Math.floor(pr), c = Math.ceil(pr);
  const frac = pr - f;
  return Math.round(curve[f] * (1 - frac) + curve[c] * frac);
}

function daClass(da) {
  if (da >= 55) return 'da-high';
  if (da >= 25) return 'da-med';
  return 'da-low';
}


// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
function fmt(n) {
  n = +n || 0;
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}

function fmtDate(s) {
  if (!s) return '';
  try { return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return s; }
}

function fmtDateShort(s) {
  if (!s) return '';
  try { return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
  catch { return s; }
}

function bookStats(b) {
  const clips = b.clips || [];
  const outlets = [...new Set(clips.map(c => c.outlet).filter(Boolean))];
  const totalViews = clips.reduce((s,c) => s + (+c.estimatedViews || 0), 0);
  const totalReach = clips.reduce((s,c) => s + (+c.reach || 0), 0);
  const totalSocial = clips.reduce((s,c) => s + (+c.socialShares || 0), 0);
  const totalAV = clips.reduce((s,c) => s + (+c.adValue || 0), 0);
  const das = clips.map(c => +c.domainAuthority || 0).filter(d => d > 0);
  const avgDA = das.length ? Math.round(das.reduce((s,d) => s+d, 0) / das.length) : 0;
  return { clips: clips.length, outlets, totalViews, totalReach, totalSocial, totalAV, avgDA };
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// PAGE: MEDIA LIST — the shared journalist/influencer database
// ═══════════════════════════════════════════════════════════════════
// Backend-first (shared via /api/contacts); falls back to localStorage in
// browser-only mode. Auto-grows from the Newsroom's byline harvest + the
// daily brief's discovery; you import your existing list once via CSV.
let _contacts = [];
let _mediaFilter = { q: '', status: 'all' };
function _saveLocalContacts() { try { localStorage.setItem('clippings_contacts', JSON.stringify(_contacts)); } catch {} }
function _readLocalContacts() { try { return JSON.parse(localStorage.getItem('clippings_contacts') || '[]'); } catch { return []; } }
// Backend = sync; localStorage = the device's durable copy. If the server ever
// comes back empty (free-tier disk reset), restore it from this device.
async function fetchContacts() {
  const base = backendBase();
  if (base) {
    try {
      const r = await fetch(`${base}/api/contacts`, { headers: apiHeaders() });
      const j = await r.json(); const remote = j.contacts || []; const local = _readLocalContacts();
      if (!remote.length && local.length) {
        try { await fetch(`${base}/api/contacts`, { method: 'POST', headers: apiHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify({ contacts: local }) }); } catch {}
        _contacts = local; return _contacts;
      }
      _contacts = remote; _saveLocalContacts(); return _contacts;
    } catch {}
  }
  _contacts = _readLocalContacts(); return _contacts;
}
async function upsertContacts(arr) {
  const nz = s => (s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
  for (const c of arr) {
    if (!c.id && !c.name) continue;
    let ex = c.id ? _contacts.find(x => x.id === c.id) : _contacts.find(x => nz(x.name) === nz(c.name) && nz(x.outlet) === nz(c.outlet));
    if (ex) Object.assign(ex, c); else { c.id = c.id || ('c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5)); c.createdAt = c.createdAt || Date.now(); _contacts.push(c); }
  }
  _saveLocalContacts();
  const base = backendBase();
  if (base) { try { await fetch(`${base}/api/contacts`, { method: 'POST', headers: apiHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify({ contacts: arr }) }); } catch {} }
}
async function deleteContactById(id) {
  _contacts = _contacts.filter(x => x.id !== id); _saveLocalContacts();
  const base = backendBase();
  if (base) { try { await fetch(`${base}/api/contacts/${id}`, { method: 'DELETE', headers: apiHeaders() }); } catch {} }
}
function contactClientNames(c) {
  return (c.clients || []).map(id => { const b = books.find(x => x.id === id); return b ? (b.client || b.name) : ''; }).filter(Boolean);
}
function isStale(c) {
  const d = c.lastTouch || c.lastSeen || ''; if (!d) return false;
  const t = Date.parse(d); if (isNaN(t)) return false;
  return (Date.now() - t) > 14 * 24 * 60 * 60 * 1000;
}

  return `<span style="font-family:var(--font-mono);font-size:.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:${v.c};">${v.t}</span>`;
}

// Forgiving CSV parse (handles quoted fields) + flexible header mapping.
function _parseCsvLine(line) {
  const out = []; let cur = '', q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (q) { if (ch === '"') { if (line[i + 1] === '"') { cur += '"'; i++; } else q = false; } else cur += ch; }
    else { if (ch === '"') q = true; else if (ch === ',') { out.push(cur); cur = ''; } else cur += ch; }
  }
  out.push(cur); return out.map(s => s.trim());
}
function importContactsCSV(input) {
  const file = input.files && input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const lines = String(e.target.result).split(/\r?\n/).filter(l => l.trim().length);
    if (lines.length < 2) { toast('CSV looks empty'); return; }
    const headers = _parseCsvLine(lines[0]).map(h => h.toLowerCase());
    const find = names => headers.findIndex(h => names.some(n => h.includes(n)));
    const iN = find(['name', 'journalist', 'reporter', 'contact']), iO = find(['outlet', 'publication', 'media', 'company']), iE = find(['email', 'e-mail']), iB = find(['beat', 'topic', 'section', 'category']), iS = find(['status']), iT = find(['tier']), iNo = find(['note', 'remark']);
    const arr = [];
    for (let r = 1; r < lines.length; r++) {
      const row = _parseCsvLine(lines[r]);
      const nm = iN >= 0 ? (row[iN] || '').trim() : (row[0] || '').trim();
      if (!nm) continue;
      arr.push({ name: nm, outlet: iO >= 0 ? (row[iO] || '').trim() : '', email: iE >= 0 ? (row[iE] || '').trim() : '', beat: iB >= 0 ? (row[iB] || '').split(/[;,/|]/).map(s => s.trim()).filter(Boolean) : [], status: iS >= 0 ? (row[iS] || '').trim().toLowerCase() : '', tier: iT >= 0 ? (row[iT] || '').trim() : '', notes: iNo >= 0 ? (row[iNo] || '').trim() : '', source: 'csv' });
    }
    if (!arr.length) { toast('No rows with a name found'); return; }
    await upsertContacts(arr); await loadMedia();
    toast(`Imported ${arr.length} contact${arr.length !== 1 ? 's' : ''}`);
  };
  reader.readAsText(file);
}
function exportContactsCSV() {
  if (!_contacts.length) { toast('No contacts to export'); return; }
  const esc2 = s => `"${String(s == null ? '' : s).replace(/"/g, '""')}"`;
  const head = ['Name', 'Outlet', 'Email', 'Beat', 'Status', 'Tier', 'Type', 'Last touch', 'Notes'];
  const rows = _contacts.map(c => [c.name, c.outlet, c.email, (c.beat || []).join('; '), c.status, c.tier, c.type, c.lastTouch || c.lastSeen || '', c.notes].map(esc2).join(','));
  const blob = new Blob([head.map(esc2).join(',') + '\n' + rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'media-list.csv'; a.click();
}

let _pitches = [];

function _saveLocalPitches() { try { localStorage.setItem('clippings_pitches', JSON.stringify(_pitches)); } catch {} }
function _readLocalPitches() { try { return JSON.parse(localStorage.getItem('clippings_pitches') || '[]'); } catch { return []; } }
async function fetchPitches() {
  const base = backendBase();
  if (base) {
    try {
      const r = await fetch(`${base}/api/pitches`, { headers: apiHeaders() });
      const j = await r.json(); const remote = j.pitches || []; const local = _readLocalPitches();
      if (!remote.length && local.length) {
        try { await fetch(`${base}/api/pitches`, { method: 'POST', headers: apiHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify({ pitches: local }) }); } catch {}
        _pitches = local; return _pitches;

    } catch {}
  }
  _pitches = _readLocalPitches(); return _pitches;
}
async function upsertPitches(arr) {
  for (const p of arr) {

    if (ex) Object.assign(ex, p, { updatedAt: Date.now() });
    else { p.id = p.id || ('p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5)); p.createdAt = p.createdAt || Date.now(); p.updatedAt = Date.now(); if (p.status === 'sent' && !p.sentAt) p.sentAt = new Date().toISOString(); _pitches.push(p); }
  }
  _saveLocalPitches();
  const base = backendBase();
  if (base) { try { await fetch(`${base}/api/pitches`, { method: 'POST', headers: apiHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify({ pitches: arr }) }); } catch {} }
}
async function deletePitchById(id) {

}
function pitchClientName(p) { const b = books.find(x => x.id === p.clientId); return b ? (b.client || b.name) : ''; }
function pitchContacts(p) { return (p.contactIds || []).map(id => _contacts.find(c => c.id === id)).filter(Boolean); }
function pitchStatusChip(s) {

}

// Who-should-we-pitch scoring: client link + coverage history + relationship + recency + outlet DA.
function recommendContacts(clientId, n = 6) {
  const now = Date.now();
  const scored = _contacts.map(c => {
    let s = 0;
    if (clientId && (c.clients || []).includes(clientId)) s += 5;
    const artForClient = (c.articles || []).filter(a => a.clientId === clientId).length;
    s += Math.min(artForClient, 3) * 2;
    const st = (c.status || '').toLowerCase();
    s += st === 'active' ? 3 : st === 'warm' ? 2 : 0;
    const lt = Date.parse(c.lastTouch || c.lastSeen || ((c.articles || [])[0] || {}).date || '');
    if (!isNaN(lt)) { const days = (now - lt) / 86400000; s += days <= 30 ? 2 : days <= 90 ? 1 : 0; }
    if (c.da >= 60) s += 2; else if (c.da >= 40) s += 1;
    return { c, s };
  });
  scored.sort((a, b) => b.s - a.s);
  const top = scored.filter(x => x.s > 0).slice(0, n).map(x => x.c);
  return top.length ? top : _contacts.slice(0, n);
}

  for (const k in PITCH_ANGLES) if (n.includes(k)) return PITCH_ANGLES[k];
  return [
    "The real story behind the news — what would make a friend say 'oh really?' (almost never the product itself)",
    "A 'why now' hook tied to this week — a forecast, a launch date, fresh data, a trending topic",
    "A spokesperson's double-layer expertise — the unexpected combination only they can speak to",
  ];
}
function suggestAngles() {
  const el = document.getElementById('pt-angle-ideas'); if (!el) return;
  const book = books.find(b => b.id === (document.getElementById('pt-client')?.value || ''));
  const name = book ? (book.client || book.name) : '';
  if (!name) { el.innerHTML = `<div style="font-size:.74rem;color:var(--ink-3);padding:4px 0;">Pick a client first to get angle ideas.</div>`; return; }
  const cats = _clientCats(name);
  const moments = (typeof opportunityMoments === 'function' ? opportunityMoments() : [])
    .filter(m => (m.cats || []).some(c => cats.includes(c))).slice(0, 3)
    .map(m => ({ a: m.angle, why: `tie to ${m.label} · ${m.when.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}` }));

function _nthWeekday(year, month, weekday, n) { // month 1-12, weekday 0=Sun
  let d = new Date(year, month - 1, 1), count = 0;
  while (d.getMonth() === month - 1) { if (d.getDay() === weekday) { if (++count === n) return new Date(d); } d.setDate(d.getDate() + 1); }
  return null;
}
function _lastWeekday(year, month, weekday) {
  let d = new Date(year, month, 0);
  while (d.getDay() !== weekday) d.setDate(d.getDate() - 1);
  return d;
}
// Recurring PR moments → next upcoming occurrence (rolls to next year if passed).
function opportunityMoments() {
  const now = new Date(); const ty = now.getFullYear();
  const fixed = (m, d) => (y) => new Date(y, m - 1, d);
  const defs = [
    { label: "New Year — pet resolutions & festive dining", cats: ['pet', 'dining'], lead: 18, date: fixed(1, 1), angle: "New-year pet wellness resolutions; New Year's Eve dining sets." },
    { label: "Valentine's Day", cats: ['dining'], lead: 18, date: fixed(2, 14), angle: "Romantic Italian dinner sets and sharing menus for two." },
    { label: "National Pet Day", cats: ['pet'], lead: 14, date: fixed(4, 11), angle: "Responsible pet ownership; founder / ambassador moment." },
    { label: "Mother's Day", cats: ['dining'], lead: 21, date: (y) => _nthWeekday(y, 5, 0, 2), angle: "Family feast / brunch sets for moms." },
    { label: "Father's Day", cats: ['dining', 'pet'], lead: 21, date: (y) => _nthWeekday(y, 6, 0, 3), angle: "Dining for dads; 'dog dads of the Philippines' pet angle." },
    { label: "Int'l Yoga Day", cats: ['pet'], lead: 14, date: fixed(6, 21), angle: "Pet yoga / calm-wellness routine tie-in." },
    { label: "World Population Day", cats: ['pet'], lead: 14, date: fixed(7, 11), angle: "Responsible pet population / adoption story." },
    { label: "Int'l Cat Day", cats: ['cat'], lead: 21, date: fixed(8, 8), angle: "Prof. Bengal lead moment — full cat-wellness angle." },
    { label: "Int'l Dog Day", cats: ['pet'], lead: 21, date: fixed(8, 26), angle: "Dr. Shiba flagship — dog wellness campaign window." },
    { label: "National Heroes' Day long weekend (PH)", cats: ['dining'], lead: 14, date: (y) => _lastWeekday(y, 8, 1), angle: "Long-weekend group / family dining occasion." },
    { label: "World Animal Day", cats: ['pet'], lead: 18, date: fixed(10, 4), angle: "CSR / feeding-stations / animal-welfare angle." },
    { label: "World Food Day", cats: ['dining'], lead: 14, date: fixed(10, 16), angle: "Heritage / authentic Italian cuisine education story." },
    { label: "Pre-holiday corporate dining bookings", cats: ['dining'], lead: 20, date: fixed(11, 15), angle: "Best venues for company Christmas parties." },
    { label: "Christmas & Noche Buena dining", cats: ['dining'], lead: 25, date: fixed(12, 20), angle: "Holiday dining listicles + Noche Buena sets." },
  ];
  const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const out = [];
  for (const def of defs) {
    let dt = def.date(ty);
    if (!dt || dt < todayMid) dt = def.date(ty + 1);
    if (dt) out.push({ ...def, when: dt });
  }
  out.sort((a, b) => a.when - b.when);
  return out;
}
function _bookmatchForCats(cats) {
  return books.filter(b => {
    const hay = `${b.client || ''} ${b.name || ''}`.toLowerCase();
    return cats.some(cat =>
      (cat === 'pet' && /pet|shiba|dog|paw/.test(hay)) ||
      (cat === 'cat' && /cat|bengal/.test(hay)) ||
      (cat === 'dining' && /roast|italian|restaurant|dining|food|sicilian/.test(hay)));
  });
}

let _opportunities = [];
let _oppFilter = 'all';
function _saveLocalOpps() { try { localStorage.setItem('clippings_opps', JSON.stringify(_opportunities)); } catch {} }
function _readLocalOpps() { try { return JSON.parse(localStorage.getItem('clippings_opps') || '[]'); } catch { return []; } }
async function fetchOpportunities() {
  const base = backendBase();
  if (base) { try {
    const r = await fetch(`${base}/api/opportunities`, { headers: apiHeaders() });
    const j = await r.json(); const remote = j.opportunities || []; const local = _readLocalOpps();
    if (!remote.length && local.length) { try { await fetch(`${base}/api/opportunities`, { method: 'POST', headers: apiHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify({ opportunities: local }) }); } catch {} _opportunities = local; return _opportunities; }
    _opportunities = remote; _saveLocalOpps(); return _opportunities;
  } catch {} }
  _opportunities = _readLocalOpps(); return _opportunities;
}
async function upsertOpportunities(arr) {
  for (const o of arr) {
    if (!o.id && !o.title) continue;
    const ex = o.id ? _opportunities.find(x => x.id === o.id) : null;
    if (ex) Object.assign(ex, o); else { o.id = o.id || ('o' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5)); o.createdAt = o.createdAt || Date.now(); _opportunities.unshift(o); }
  }
  _saveLocalOpps();
  const base = backendBase(); if (base) { try { await fetch(`${base}/api/opportunities`, { method: 'POST', headers: apiHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify({ opportunities: arr }) }); } catch {} }
}
async function deleteOpportunityById(id) {
  _opportunities = _opportunities.filter(x => x.id !== id); _saveLocalOpps();

}
async function loadOpportunities() { await fetchOpportunities(); renderOpportunities(); }
function renderOpportunities() {
  const el = document.getElementById('ops-live'); if (!el) return;
  let list = _opportunities.filter(o => o.status !== 'dismissed');
  if (activeClient) list = list.filter(o => !o.client || o.client === activeClient);
  if (_oppFilter && _oppFilter !== 'all') list = list.filter(o => o.type === _oppFilter);
  const _fb = document.getElementById('ops-filter'); if (_fb) _fb.innerHTML = oppFilterBar();
  if (!list.length && _oppFilter && _oppFilter !== 'all') { el.innerHTML = `<div style="border:1px dashed var(--rule);border-radius:var(--radius-lg);padding:36px 32px;text-align:center;color:var(--ink-2);font-size:.85rem;">Nothing in this filter right now — <button onclick="setOppFilter('all')" style="color:var(--red);background:none;border:none;padding:0;cursor:pointer;font:inherit;font-weight:600;">show all</button>.</div>`; return; }
  if (!list.length) { el.innerHTML = `<div style="border:1px dashed var(--rule);border-radius:var(--radius-lg);padding:44px 32px;text-align:center;color:var(--ink-2);font-size:.86rem;line-height:1.55;">No live opportunities flagged yet. The daily brief drops collab targets, competitor counters and news tie-ins here — or <button onclick="openOpportunityModal()" style="color:var(--red);background:none;border:none;padding:0;cursor:pointer;font-size:inherit;font-family:inherit;font-weight:600;">flag one yourself</button>.</div>`; return; }
  // Segment by client — untagged opportunities group under "Cross-client"; roster order, newest first within each.
  const groups = {};
  list.forEach(o => { const k = o.client || 'Cross-client'; (groups[k] = groups[k] || []).push(o); });
  const order = clientList();
  const rank = k => (k === 'Cross-client' ? 999 : (order.indexOf(k) < 0 ? 500 : order.indexOf(k)));
  el.innerHTML = Object.keys(groups).sort((a, b) => rank(a) - rank(b) || a.localeCompare(b)).map(k => {
    const items = groups[k].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    return `<div style="margin-bottom:24px;">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:11px;"><span style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink);">${esc(k)}</span><span class="mono" style="font-size:.7rem;color:var(--ink-3);">${items.length}</span></div>
      ${items.map(o => opportunityRow(o)).join('')}
    </div>`;
  }).join('');
}
function oppFilterBar() {
  let base = _opportunities.filter(o => o.status !== 'dismissed');
  if (activeClient) base = base.filter(o => !o.client || o.client === activeClient);
  const c = {}; base.forEach(o => { c[o.type] = (c[o.type] || 0) + 1; });
  const defs = [['all', 'All', base.length], ['collab', 'Brand collabs', c.collab || 0], ['news', 'News angles', c.news || 0], ['competitor', 'Competitor', c.competitor || 0], ['general', 'Ideas', c.general || 0]];
  return defs.map(([k, label, n]) => {
    const on = (_oppFilter || 'all') === k;
    return `<button onclick="setOppFilter('${k}')" style="border:1px solid ${on ? 'var(--red)' : 'var(--rule)'};background:${on ? 'var(--red)' : 'transparent'};color:${on ? '#fff' : 'var(--ink-2)'};border-radius:100px;padding:5px 13px;font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;">${label}${n ? ` <span style="opacity:.65;">${n}</span>` : ''}</button>`;
  }).join('');
}

async function saveOpportunity(id) {

        <h1 style="font-family:var(--font-display);font-size:2.8rem;font-weight:800;letter-spacing:-.025em;line-height:1.0;color:var(--ink);">Opportunities</h1>
        <p style="font-size:.86rem;color:var(--ink-2);margin-top:12px;max-width:62ch;line-height:1.55;">Live openings first — brands to collaborate with, competitor moves to counter, and cultural moments to ride. They don't have to be on-beat: any moment a client can credibly join the broader conversation counts — even a brand's launch or campaign worth a collab. Flagged by the daily brief or added by you. Then the seasonal calendar so you're early on every window.</p>

let _mentions = [];
let _nrFilter = { q: '', client: 'all', sort: 'found-desc' };

async function clearNewsroom(btn) {
  const base = backendBase();
  if (!base) { toast('Connect a backend first'); return; }
  confirmAction('Clear & refresh the Newsroom?', 'Flushes all current mentions and re-pulls cleanly with the curated searches. Approved coverage in your books is untouched.', async () => {
    if (btn) { btn.disabled = true; btn.style.opacity = '.6'; }
    toast('Clearing & re-pulling…');
    try {
      await fetch(`${base}/api/mentions/clear`, { method: 'POST', headers: apiHeaders() });
      await new Promise(r => setTimeout(r, 2500));
      await loadNewsroom();
      toast('Newsroom refreshed');
    } catch { toast('Could not reach the backend.'); }
    if (btn) { btn.disabled = false; btn.style.opacity = ''; }
  });
}

async function loadNewsroom() {
  const el = document.getElementById('newsroom-list');
  if (!el) return;
  const base = backendBase();
  if (!base) { el.innerHTML = newsroomEmpty('Connect a backend to see the live news crawl.'); return; }
  try {
    const r = await fetch(`${base}/api/mentions`, { headers: apiHeaders() });
    const j = await r.json();
    _mentions = j.mentions || [];
    renderNewsroomList();
  } catch { el.innerHTML = newsroomEmpty('Could not reach the backend.'); }
}
// Apply search + client filter + sort, then render rows. Only touches the list
// (not the controls), so the search box keeps focus while typing.
function renderNewsroomList() {
  const el = document.getElementById('newsroom-list'); if (!el) return;
  const countEl = document.getElementById('newsroom-count');
  if (!_mentions.length) { el.innerHTML = newsroomEmpty('No mentions yet. Add keywords in a project\'s Monitor tab, then click “Check now”.'); if (countEl) countEl.textContent = ''; return; }
  let list = _mentions.slice();
  const q = (_nrFilter.q || '').toLowerCase().trim();
  if (q) list = list.filter(m => `${m.title || ''} ${m.outlet || ''} ${m.keyword || ''} ${m.clientName || ''}`.toLowerCase().includes(q));
  if (activeClient) list = list.filter(m => (m.clientName || '') === activeClient);
  const dnum = m => Date.parse(m.date || 0) || 0;
  const fnum = m => Date.parse(m.foundAt || m.date || 0) || 0;
  const s = _nrFilter.sort;
  if (s === 'date-desc') list.sort((a, b) => dnum(b) - dnum(a));
  else if (s === 'date-asc') list.sort((a, b) => dnum(a) - dnum(b));
  else if (s === 'outlet') list.sort((a, b) => (a.outlet || '').localeCompare(b.outlet || '') || fnum(b) - fnum(a));
  else if (s === 'client') list.sort((a, b) => (a.clientName || '').localeCompare(b.clientName || '') || fnum(b) - fnum(a));
  else list.sort((a, b) => fnum(b) - fnum(a)); // found-desc (default)
  const filtered = !!q;
  if (countEl) countEl.textContent = `${list.length} mention${list.length !== 1 ? 's' : ''}${filtered ? ' (filtered)' : ''} · ${activeClient || 'all clients'}`;
  if (!list.length) { el.innerHTML = `<div style="text-align:center;padding:56px 0;color:var(--ink-3);font-size:.86rem;">No mentions match this filter.</div>`; return; }
  el.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px;">${list.map(m => newsroomRow(m)).join('')}</div>`;
}

function newsroomRow(m) {
  const dom = extractDomain(m.sourceUrl || m.url || '');
  const logo = dom ? outletLogoUrl(dom) : '';
  const b = books.find(x => x.id === m.clientId);
  const accent = (b && b.accentColor) || '#2d5f3d';
  const client = m.clientName || (b && (b.client || b.name)) || '';
  return `
  <a href="${esc(m.url)}" target="_blank" rel="noopener" style="text-decoration:none;border:1px solid var(--rule);border-radius:var(--radius-lg);padding:16px 20px;background:var(--surface);display:flex;align-items:center;gap:16px;transition:border-color var(--t) var(--ease);"
    onmouseover="this.style.borderColor='#d4d0ca'" onmouseout="this.style.borderColor='var(--rule)'">

let _intelData = { latest: null, history: [] };
function pageIntel() {

    </div>

async function loadIntel() {
  const el = document.getElementById('intel-body');
  if (!el) return;
  const base = backendBase();
  if (!base) { el.innerHTML = intelEmpty('Connect a backend to receive your daily brief here.'); return; }
  try {
    const r = await fetch(`${base}/api/brief`, { headers: apiHeaders() });
    _intelData = await r.json();
    if (!_intelData.latest) { el.innerHTML = intelEmpty('No brief yet. Your daily PR Intel task will post the first one here each morning.'); return; }
    renderIntel(_intelData.latest.postedAt);
  } catch { el.innerHTML = intelEmpty('Could not reach the backend.'); }
}

function allBriefs() {
  const all = [];
  if (_intelData.latest) all.push(_intelData.latest);
  for (const h of (_intelData.history || [])) if (!all.find(x => x.postedAt === h.postedAt)) all.push(h);
  return all;
}
function showBrief(postedAt) { renderIntel(postedAt); const el = document.getElementById('intel-body'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }

function renderIntel(postedAt) {
  const el = document.getElementById('intel-body');
  if (!el) return;
  const all = allBriefs();
  const L = all.find(x => x.postedAt === postedAt) || all[0];
  if (!L) { el.innerHTML = intelEmpty('No brief yet.'); return; }
  const others = all.filter(x => x.postedAt !== L.postedAt).slice(0, 8);
  el.innerHTML = `
    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap;">
      <div style="font-family:var(--font-display);font-size:1.4rem;font-weight:600;letter-spacing:-.015em;color:var(--ink);">${esc(L.subject || 'PR Intelligence Brief')}</div>
      <div class="eyebrow">${esc(L.date || (L.postedAt || '').slice(0, 10))}</div>
    </div>
    <div style="border:1px solid var(--rule);border-radius:var(--radius-lg);background:var(--surface);overflow:hidden;">${briefBodyHtml(L)}</div>
    ${others.length ? `<div class="eyebrow" style="margin:34px 0 14px;">Earlier briefs</div>
      <div style="display:flex;flex-direction:column;border:1px solid var(--rule);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);">
        ${others.map((h, i) => `<div onclick="showBrief('${esc(h.postedAt)}')" style="cursor:pointer;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;${i < others.length - 1 ? 'border-bottom:1px solid var(--rule);' : ''}transition:background var(--t-fast) var(--ease);" onmouseover="this.style.background='var(--paper-2)'" onmouseout="this.style.background=''">
          <span class="truncate" style="font-size:.84rem;color:var(--ink);font-weight:500;">${esc(h.subject || 'PR Intelligence Brief')}</span>
          <span style="font-size:.72rem;color:var(--ink-3);flex-shrink:0;">${esc(h.date || (h.postedAt || '').slice(0, 10))}</span>
        </div>`).join('')}
      </div>` : ''}`;
}

function briefBodyHtml(L) {
  if (L.html) {
    const doc = `<!doctype html><meta charset="utf-8"><base target="_blank"><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a1815;line-height:1.55;padding:24px 28px;margin:0;font-size:14px;}a{color:#1a6fa3;}img{max-width:100%;height:auto;}table{max-width:100%;}pre{white-space:pre-wrap;}</style>${L.html}`;
    return `<iframe id="intel-frame" style="width:100%;border:0;display:block;min-height:400px;" onload="resizeIntelFrame(this)" srcdoc="${esc(doc)}"></iframe>`;
  }
  if (L.markdown) return `<pre style="white-space:pre-wrap;font-family:var(--font-mono);font-size:.8rem;color:var(--ink);padding:24px 28px;margin:0;line-height:1.55;">${esc(L.markdown)}</pre>`;
  return '';
}
function resizeIntelFrame(f) {
  try { f.style.height = (f.contentWindow.document.body.scrollHeight + 36) + 'px'; } catch { f.style.height = '700px'; }
}
function intelEmpty(msg) {
  return `<div style="border:1px dashed var(--rule);border-radius:var(--radius-lg);padding:64px 32px;text-align:center;">
    <div style="width:48px;height:48px;border-radius:50%;background:var(--paper-2);margin:0 auto 16px;display:grid;place-items:center;">
      <svg width="20" height="20" fill="none" stroke="var(--ink-3)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 4h16v12H4z"/><path d="M7 8h10M7 12h6"/><path d="M8 20h8"/></svg>
    </div>
    <p style="font-size:.86rem;color:var(--ink-2);max-width:430px;margin:0 auto;line-height:1.55;">${esc(msg)}</p>
  </div>`;
}
